<main id="container-1">
<div class="intro">
    <h1>Analyze Websites</h1>
    <p>Check any project to see if it’s reviewed, unreviewed, or marked as malicious or suspicious, using data from multiple independent vendors.</p>
</div>


<div id="searchContainer">
  <input 
    type="text" 
    id="searchBox" 
    placeholder="example.com" 
    required
  >
  <button class="button" id="searchBtn">Search</button>
</div>

<div id="results"></div>

<script type="module">
const reviewers = [
    { name: "Kaspa Hub", url: "https://kaspahub.github.io/directory/reviews.js" },
    { name: "Reviewer 1", url: "https://kaspahub.github.io/directory/reviews-test.js" },
    { name: "missing test", url: "https://kaspahub.github.io/directory/users.js" }
];

function validateDomain(input) {
    const domainPattern = /^(https:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$/;
    if (!domainPattern.test(input)) {
        return { valid: false, reason: "Invalid domain. Use example.com or https://example.com" };
    }
    return { valid: true };
}

async function loadReviewerData(reviewer) {
    try {
        const module = await import(reviewer.url + `?t=${Date.now()}`);

        if (typeof module.items !== "object" || module.items === null || Array.isArray(module.items)) {
            console.error(`Reviewer ${reviewer.name} has invalid format (should be an object map)`);
            return null;
        }

        for (let [url, review] of Object.entries(module.items)) {
            if (typeof url !== "string" || typeof review !== "number") {
                console.error(`Reviewer ${reviewer.name} has invalid entry:`, url, review);
                return null;
            }
        }
        return module.items;

    } catch (err) {
        console.error(`Failed to load reviewer ${reviewer.name}:`, err);
        return null;
    }
}

async function runSearch() {
    let query = document.getElementById("searchBox").value.trim().toLowerCase();
    if (query.endsWith("/")) {
        query = query.slice(0, -1);
    }
    if (!query) return;

    const validation = validateDomain(query);
    if (!validation.valid) {
        document.getElementById("results").innerHTML = `<span style="margin: 10px;">${validation.reason}</span>`;
        return;
    }

    document.getElementById("results").innerHTML = "Loading...";
    
    const allResults = [];

    for (let reviewer of reviewers) {
        const data = await loadReviewerData(reviewer);
        if (!data) {
            allResults.push({ name: reviewer.name, review: null });
            continue;
        }

        const reviewScore = data[query] ?? 0;

        if (reviewScore >= 1) {
            allResults.push({ name: reviewer.name, review: 1 });
        } else if (reviewScore === -1) {
            allResults.push({ name: reviewer.name, review: -1 });
        } else if (reviewScore === -2) {
            allResults.push({ name: reviewer.name, review: -2 });
        } else {
            allResults.push({ name: reviewer.name, review: 0 });
        }
    }

    let html = `<table>
        <tr><th>Reviewer</th><th>Status</th></tr>`;
    for (let r of allResults) {
        let status;
        if (r.review === 1) status = `<span class="positive">✅ Reviewed</span>`;
        else if (r.review === -1) status = `<span class="warning">⚠️ Suspicious</span>`;
        else if (r.review === -2) status = `<span class="negative">❌ Malicious</span>`;
        else status = `<span class="neutral">N/A</span>`;
        html += `<tr><td>${r.name}</td><td>${status}</td></tr>`;
    }
    html += `</table>`;

    document.getElementById("results").innerHTML = html;
}

document.getElementById("searchBtn").addEventListener("click", runSearch);

document.getElementById("searchBox").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        runSearch();
    }
});
</script>
