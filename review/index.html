<script type="text/javascript">
'use strict';

const reviewers = [
  { name: "Kaspa Hub", url: "https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/data/reviews.json" },
  { name: "test 1", url: "https://kaspahub.github.io/directory/reviews-test.json" }
];

let dataReady = false;
const pageData = document.getElementById("pageData");

async function loadReviewerData(url, name) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (typeof data !== "object" || data === null || Array.isArray(data)) {
      console.error(`Reviewer ${name} JSON is invalid (should be an object map)`);
      return null;
    }
    return data;
  } catch (err) {
    console.error(`Failed to load reviewer ${name}:`, err);
    return null;
  }
}

function normalizeDomain(input) {
  let query = input.trim();
  if (!query) return null;

  try {
    const normalized = input.startsWith("http://") || input.startsWith("https://")
      ? input
      : `https://${input}`;
    const url = new URL(normalized);
    query = url.hostname.replace(/^www\./i, "").toLowerCase();
  } catch {
    return null;
  }

  const domainPattern = /^([a-zA-Z0-9-]+\.)+[a-zA-Z0-9]{2,}$/;
  return domainPattern.test(query) ? query : null;
}

function renderResults(query, allResults) {
  const validReviews = allResults.filter(r => r.review !== null);
  let average = "N/A";
  if (validReviews.length > 0) {
    const rawAvg = validReviews.reduce((acc, r) => acc + r.review, 0) / validReviews.length;
    average = parseFloat(rawAvg).toFixed(1);
  }

  const avgNum = validReviews.length > 0 ? parseFloat(average) : null;
  const isLow = avgNum !== null && avgNum <= 2;
  const headerClass = isLow ? ' class="low-rating"' : '';

  let html = `<h2 style="margin: 30px; text-align: center;"${headerClass}>${query} — <span>${average}</span></h2>`;
  html += `<div class="tableWrap"><table cellspacing="0" cellpadding="6"><thead><tr><th>Source</th><th></th><th>Rating</th></tr></thead><tbody>`;

  for (let result of allResults) {
    let infoCell = result.comment
      ? `<span class="info-bubble" title="${result.comment.replace(/"/g, '&quot;')}">💬</span>`
      : '';

    let status;
    const rating = result.review;
    if (rating == null) {
      status = `<span class="neutral">N/A</span>`;
    } else {
      const clamped = Math.min(5, Math.max(0, rating));
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += `<span class="${i <= clamped ? 'star' : 'star empty'}"></span>`;
      }
      status = `<div class="stars">${stars}</div>`;
    }

    html += `<tr><td>${result.name}</td><td style="text-align: center;">${infoCell}</td><td>${status}</td></tr>`;
  }

  html += `</tbody></table></div>`;
  pageData.innerHTML = html;
  pageData.style.display = 'block';
}

async function performSearch(queryInput, updateHistory = true) {
  if (!dataReady) return;

  const query = normalizeDomain(queryInput);
  if (!query) {
    pageData.innerHTML = `<span style="margin: 10px;">Invalid domain. Use example.com</span>`;
    pageData.style.display = 'block';
    return;
  }

  pageData.innerHTML = `<div class="fade-in"><span class="spinner"></span><span>Loading...</span></div>`;
  pageData.style.display = 'block';

  const allResults = [];
  for (let reviewer of reviewers) {
    const data = reviewer.cache;
    if (!data) {
      allResults.push({ name: reviewer.name, review: null, comment: null });
      continue;
    }
    const entry = data[query];
    let rating = null, comment = null;
    if (entry !== undefined) {
      if (Array.isArray(entry)) {
        rating = entry[0];
        comment = entry[1] ?? null;
      } else {
        rating = entry;
      }
      rating = Math.min(5, Math.max(0, rating));
    }
    allResults.push({ name: reviewer.name, review: rating, comment });
  }

  renderResults(query, allResults);

  if (updateHistory) {
    const newUrl = `/reviews/?q=${encodeURIComponent(query)}`;
    history.pushState({ query }, '', newUrl);
  }
}

async function init() {
  for (let reviewer of reviewers) {
    reviewer.cache = await loadReviewerData(reviewer.url, reviewer.name);
  }
  dataReady = true;

  const params = new URLSearchParams(location.search);
  const initialQuery = params.get('q');
  if (typeof initialQuery === 'string' && initialQuery.trim()) {
    const cleaned = initialQuery.trim();
    await performSearch(cleaned, false);
    history.replaceState({ query: normalizeDomain(cleaned) }, '', location.href);
  }
}

init();

let throttle = false;

document.getElementById('searchContainer').addEventListener('submit', (event) => {
  event.preventDefault();
  if (throttle) return;
  throttle = true;
  setTimeout(() => throttle = false, 100);
  explorerSearch(sanitizeSearch(searchQueryInput.value), '[form] ');
});

</script>
