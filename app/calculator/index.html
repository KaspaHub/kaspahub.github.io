<script>
let _isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
var _isFirefox = typeof InstallTrigger !== 'undefined';
console.log("isSafari:"+_isSafari+",isFirefox:"+_isFirefox);
if (navigator && navigator.serviceWorker) {
  if (_isFirefox) {
    console.log("omit service worker (not needed)");
  } else {
    console.log("register service worker for edge and chrome (and the rest)");
    navigator.serviceWorker.register('https://kaspahub.org/app/calculator/assets/service-worker.js').then(function(reg) {
      // registration worked
      console.log('Registration succeeded. Scope:' + reg.scope + ",installing:"+reg.installing+",waiting:"+reg.waiting+",active:"+reg.active);
    }).catch(function(error) {
      // registration failed
      console.warn('Registration failed with ' + error);
    });
  }
} else {
  console.log("no serviceWorker available");
}
//////////////////
//ordinary JS file
var _start=null;
console.log("simple.js loaded");
function myfetch(url) {
  _start=performance.now();
  fetch(url)
  .then(function(response) {
    if (!response.ok) {
      throw Error(response.statusText);
    }
    return response;
  }).then(function(response) {
    appendMessage(`fetch ok url:${url}..waiting for data...`);
    return response.arrayBuffer();
  }).then(function(buf) {
    let t=performance.now()-_start;
    appendMessage(`data ready url:${url},len:${buf.byteLength},time:${t}`);
  })
  .catch(function(error) {
    appendMessage(`fetch error url:${url},error:${error}`);
  });
}
//preload the 2nd page for offline caching
myfetch("/offline.html"); //add a query param in the update case

function appendMessage(msg) {
  console.log(msg);
  var divStr = `<div>${msg}</div>`;
  document.getElementsByTagName('body')[0].innerHTML += divStr;
}

<script>const c=document.getElementById("theme-toggle");if(localStorage.getItem("dark")===null){c.checked=false;document.body.className="background-light"}else{c.checked=true;document.body.className="background-dark"}c.addEventListener("change",()=>{if(c.checked){localStorage.setItem("dark","");document.body.className="background-dark"}else{localStorage.removeItem("dark");document.body.className="background-light"}});</script>

<main style="margin: 0 auto; padding-bottom: 0;">

<div class="container-0 fade-in theme-1">

<div class="top-bar">
    <a draggable="false" href="/apps/"><svg width="1em" height="1em" viewBox="0 0 20 20" fill="#EC6A5E"><circle cx="10" cy="10" r="10" /></svg></a>
    <label>Text Editor</label>
    <button id="save"><svg width="1em" height="1em" viewBox="0 0 20 20" fill="gray"><circle cx="10" cy="10" r="10" /></svg></button>
</div>

<section id="calculator">
	<input type="text" id="input" oninput="updateResult()" placeholder="" />
	<input type="text" id="result" disabled />
<div class="rwrap theme-filter">
	<button class="e-button" style="color: orange;" onclick="clean()">C</button>
	<button class="e-button" onclick="append('(')">(</button>
	<button class="e-button" onclick="append(')')">)</button>
	<button class="e-button" onclick="backspace()">⌫</button>

	<button class="e-button" onclick="append('7')">7</button>
	<button class="e-button" onclick="append('8')">8</button>
	<button class="e-button" onclick="append('9')">9</button>
	<button class="e-button" onclick="append('/')">÷</button>

	<button class="e-button" onclick="append('4')">4</button>
	<button class="e-button" onclick="append('5')">5</button>
	<button class="e-button" onclick="append('6')">6</button>
	<button class="e-button" onclick="append('+')">+</button>
	<button class="e-button" onclick="append('1')">1</button>
	<button class="e-button" onclick="append('2')">2</button>
	<button class="e-button" onclick="append('3')">3</button>
	<button class="e-button" onclick="append('*')">x</button>

	<button class="e-button" onclick="append('0')">0</button>
	<button class="e-button" onclick="append('.')">.</button>
	<button class="e-button" onclick="append('-')">-</button>

	<button class="e-button" onclick="calculate()">=</button>

<script>
const result = document.getElementById("result");
const input = document.getElementById("input");
const inputField = document.getElementById('input');
const saveButton = document.getElementById('save');



function append(value) {
	input.value += value;
	updateResult();
	result.focus();
}

function clean() {
	result.value = "";
	input.value = "";
}

function backspace() {
	input.value = input.value.slice(0, -1);
	updateResult();
}

function updateResult() {
 try {
	result.value = eval(input.value);
 } catch (error) {
	result.value = "";
 }
}

function calculate() {
try {
	input.value = eval(input.value);
	result.value = "";
	updateResult();
 } catch (error) {
	input.value = "";
	result.value = "";
 }
}



result.addEventListener("keypress", function(event) {
	if (event.key === "Enter") {
	event.preventDefault();
	calculate();
		updateResult();
	}
}); 


//save

window.onload = function () {
	const savedValue = localStorage.getItem('myInputValue');
	if (savedValue) {
		inputField.value = savedValue;
		setButtonGreen();
		updateResult();
		waitForAnyChange();
	}
};

saveButton.addEventListener('click', function () {
	const inputValue = inputField.value;
	localStorage.setItem('myInputValue', inputValue);
	setButtonGreen();
	waitForAnyChange();
});

function setButtonGreen() {
	saveButton.innerHTML = '<svg width="1em" height="1em" viewBox="0 0 20 20" fill="#61C554"><circle cx="10" cy="10" r="10" /></svg>';
}

function setButtonGray() {
	saveButton.innerHTML = '<svg width="1em" height="1em" viewBox="0 0 20 20" fill="gray"><circle cx="10" cy="10" r="10" /></svg>';
}

function waitForAnyChange() {
	const input = document.getElementById('input');
	let lastValue = input.value;

	const intervalId = setInterval(() => {
		if (input.value !== lastValue) {
			clearInterval(intervalId);
			setButtonGray();
		}
	}, 1000);
}




</script>
