<script type="text/javascript">
'use strict';
$('#summernote').summernote({
	placeholder: 'Start writing...',
	prettifyHtml: true,
	tooltip: false,
	linkTargetBlank: false,

	tabsize: 2,
      toolbar: [
        ['style', ['clear']],
        ['style', ['bold', 'italic', 'underline', 'strikethrough']],
        ['style', ['ul', 'ol']],
        ['style', ['alignleft', 'aligncenter', 'alignright']],
        ['style', ['style']],
        ['style', ['fontsize']],
        ['style', ['color']],
        ['style', ['table']],
        ['style', ['link', 'picture', 'video']],
        ['style', ['symbolDropdown']],
        ['style', ['codeview']]
      ],
buttons: {
  symbolDropdown: function () {
    return $('<div class="note-btn-group btn-group">').append(`
      <select class="e-button note-btn" 
              style="margin: 0 5px; height: 30px; padding: 2px 5px;" 
              onchange="insertSymbol(this); this.selectedIndex = 0;" tabindex="-1">
        <option value="" selected disabled hidden>Symbols ▼</option>
        <option value="✓">✓</option>
        <option value="•">•</option>
        <option value="▲">▲</option>
        <option value="▼">▼</option>
        <option value="◄">◄</option>
        <option value="►">►</option>
        <option value="₿">₿</option>
        <option value="𐤊">𐤊</option>
      </select>
    `);
  }
}
});

function insertSymbol(select) {
	const symbol = select.value;
	$('#summernote').summernote('editor.insertText', symbol);
}

//tab
document.addEventListener("DOMContentLoaded", function() {
	const contentEditableDiv = document.querySelector(".note-editable");

	if (contentEditableDiv) {
		contentEditableDiv.addEventListener("keydown", function(event) {
			if (event.keyCode === 9 && contentEditableDiv.innerHTML !== "") {
				event.preventDefault();
				document.execCommand("insertHTML", false, "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;");
			}
		});
	}
});

document.addEventListener("DOMContentLoaded", function () {
  const editor = document.getElementById("text-editor");
  const charCountLabel = document.getElementById("charCount");
  const wordCountLabel = document.getElementById("wordCount");

  if (editor && charCountLabel && wordCountLabel) {
    editor.addEventListener("input", function () {
      const text = editor.innerText || "";
      const charCount = text.replace(/\n/g, "").length;

      const words = text.trim().split(/\s+/).filter(word => word.length > 0);
      const wordCount = words.length;

      charCountLabel.textContent = charCount;
      wordCountLabel.textContent = wordCount;
    });
  }
});


if (document.cookie.includes("theme=dark")) {
	document.querySelectorAll(".theme-filter").forEach(elem =>
		elem.classList.add("filter-dark")
	);
}

// function toggleAdditional() {

</script>
