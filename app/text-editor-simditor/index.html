  <h2>Simditor with Code View Toggle</h2>
  <textarea id="editor" placeholder="Write rich text here..."></textarea>
  <pre id="code-view" contenteditable="true"></pre>

  <button id="toggle-code" class="button">Toggle Code View</button>

</main>

<footer><a href="https://kaspahub.org/">Kaspa Community Hub</a></footer>

<style>
  body {
  #editor {
    height: 400px;
  }
  #code-view {
    display: none;
    width: 100%;
    height: 400px;
    font-family: monospace;
    white-space: pre-wrap;
    padding: 10px;
    border: 1px solid #ccc;
  }
  .button {
    margin-top: 10px;
  }
</style>

<script src="/assets/scripts/jquery.js"></script>
<script src="module.js"></script>
<script src="hotkeys.js"></script>
<script src="uploader.js"></script>
<script src="simditor.js"></script>

<script>
  var editor;
  var codeVisible = false;

  $(function () {
    editor = new Simditor({
      textarea: $('#editor'),
      toolbar: [
        'title', 'bold', 'italic', 'underline', 'strikethrough',
        'color', 'ol', 'ul', 'blockquote', 'code', 'table',
        'link', 'image', 'hr', 'indent', 'outdent', 'alignment'
      ]
    });

    $('#toggle-code').on('click', function () {
      if (!codeVisible) {
        // Show code view
        var html = editor.getValue();
        $('#code-view').text(html).show();
        $('.simditor').hide();
        $(this).text('Toggle WYSIWYG View');
      } else {
        // Save code view changes back into editor
        var rawHtml = $('#code-view').text();
        editor.setValue(rawHtml);
        $('#code-view').hide();
        $('.simditor').show();
        $(this).text('Toggle Code View');
      }
      codeVisible = !codeVisible;
    });
  });
</script>

</body>
