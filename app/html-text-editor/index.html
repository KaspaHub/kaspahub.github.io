<body class="">

	<script>const c=document.getElementById("toggle-theme-checkbox");c.addEventListener("change",()=>{document.cookie="theme="+(c.checked?"dark":"light")+"; path=/; SameSite=Lax";location.reload()}),c.checked=document.cookie.includes("theme=dark"),(()=>{document.body.classList.add("background-"+(document.cookie.includes("theme=dark")?"dark":"light"))})();</script>

  <button id="save"><svg width="1em" height="1em" viewBox="0 0 20 20" fill="gray"><circle cx="10" cy="10" r="10" /></svg></button>
</div>


    <div id="toolbar">
        <button id="clear">Clear Styling</button>
        <button id="bold">Bold</button>
        <button id="italic">Italic</button>
        <button id="underline">Underline</button>
        <button id="strikethrough">Strikethrough</button>
        <button id="bulletList">Bullet List</button>
        <button id="numberedList">Numbered List</button>
        <button id="alignLeft">Align Left</button>
        <button id="alignCenter">Align Center</button>
        <button id="alignRight">Align Right</button>
        <select id="format">
            <option value="">Text Format</option>
            <option value="p">Paragraph</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
            <option value="h4">Heading 4</option>
            <option value="h5">Heading 5</option>
            <option value="h6">Heading 6</option>
        </select>
        <div class="size-group">
            <input type="number" id="textSize" placeholder="Size in rem" value="1.2" step="0.1" min="0.1" style="width: 100px;">
            <button id="applySize">Apply Size</button>
        </div>
        <select id="fontFamily">
            <option value="">Font Family</option>
            <option value="Arial">Arial</option>
            <option value="Helvetica">Helvetica</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Verdana">Verdana</option>
        </select>
        <div class="color-group">
            <input type="color" id="textColor">
            <button id="applyTextColor">Apply Text Color</button>
        </div>
        <div class="color-group">
            <input type="color" id="bgColor">
            <button id="applyBgColor">Apply Background Color</button>
        </div>
        <select id="insertTable">
            <option value="">Insert Table</option>
            <option value="2x2">2x2 Table</option>
            <option value="3x3">3x3 Table</option>
            <option value="4x4">4x4 Table</option>
        </select>
        <button id="insertLink">Insert Link</button>
        <button id="insertImage">Insert Image</button>
        <button id="toggleCode">Toggle HTML View</button>
        <button id="undo">Undo</button>
        <button id="redo">Redo</button>
    </div>
    <div id="editor" contenteditable="true"><p><br><p></div>
    <textarea id="code-view"></textarea>



</div>

</main>
<footer><a href="https://kaspahub.org">Kaspa Community Hub</a>© 2025</footer>
<script>
$(document).ready(function() {
    const editor = $('#editor')[0];
    const codeView = $('#code-view')[0];
    let isCodeView = false;

    // Load saved content from localStorage on page load
    if (localStorage.getItem('KaspaHubEditor')) {
        editor.innerHTML = localStorage.getItem('KaspaHubEditor');
    }

    // Helper function to execute commands
    function execCmd(command, value = null) {
        document.execCommand(command, false, value);
    }

    // Clear styling
    $('#clear').on('click', function() {
        execCmd('removeFormat');
    });

    // Bold
    $('#bold').on('click', function() {
        execCmd('bold');
    });

    // Italic
    $('#italic').on('click', function() {
        execCmd('italic');
    });

    // Underline
    $('#underline').on('click', function() {
        execCmd('underline');
    });

    // Strikethrough
    $('#strikethrough').on('click', function() {
        execCmd('strikethrough');
    });

    // Bullet List
    $('#bulletList').on('click', function() {
        execCmd('insertUnorderedList');
    });

    // Numbered List
    $('#numberedList').on('click', function() {
        execCmd('insertOrderedList');
    });

    // Align Left
    $('#alignLeft').on('click', function() {
        execCmd('justifyLeft');
    });

    // Align Center
    $('#alignCenter').on('click', function() {
        execCmd('justifyCenter');
    });

    // Align Right
    $('#alignRight').on('click', function() {
        execCmd('justifyRight');
    });

    // Text Format
    $('#format').on('change', function() {
        const value = $(this).val();
        if (value) {
            execCmd('formatBlock', value);
            $(this).val('');
        }
    });

    // Text Size
    $('#applySize').on('click', function() {
        const size = $('#textSize').val();
        if (size) {
            execCmd('fontSize', 4);
            const selection = window.getSelection();
            if (selection.rangeCount) {
                const range = selection.getRangeAt(0);
                const spans = $(editor).find('font[size="4"]');
                spans.css('font-size', `${size}rem`).removeAttr('size');
            }
        }
    });

    // Font Family
    $('#fontFamily').on('change', function() {
        const family = $(this).val();
        if (family) {
            execCmd('fontName', family);
            $(this).val('');
        }
    });

    // Text Color
    $('#applyTextColor').on('click', function() {
        const color = $('#textColor').val();
        execCmd('foreColor', color);
    });

    // Background Color
    $('#applyBgColor').on('click', function() {
        const color = $('#bgColor').val();
        execCmd('hiliteColor', color);
    });

    // Insert Table
    $('#insertTable').on('change', function() {
        const value = $(this).val();
        if (value) {
            const [rows, cols] = value.split('x').map(Number);
            let tableHtml = '<table border="1">';
            for (let i = 0; i < rows; i++) {
                tableHtml += '<tr>';
                for (let j = 0; j < cols; j++) {
                    tableHtml += '<td>&nbsp;</td>';
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</table>';
            execCmd('insertHTML', tableHtml);
            $(this).val('');
        }
    });

    // Insert Link
    $('#insertLink').on('click', function() {
        const url = prompt('Enter the URL:');
        if (url) {
            execCmd('createLink', url);
        }
    });

    // Insert Image
    $('#insertImage').on('click', function() {
        const url = prompt('Enter the image URL:');
        if (url) {
            execCmd('insertImage', url);
        }
    });

    // Toggle HTML Code View
    $('#toggleCode').on('click', function() {
        if (isCodeView) {
            // Switch back to editor
            editor.innerHTML = codeView.value;
            $(editor).show();
            $(codeView).hide();
            isCodeView = false;
        } else {
            // Switch to code view
            codeView.value = editor.innerHTML;
            $(editor).hide();
            $(codeView).show();
            isCodeView = true;
        }
    });

    // Undo
    $('#undo').on('click', function() {
        execCmd('undo');
    });

    // Redo
    $('#redo').on('click', function() {
        execCmd('redo');
    });

    // Save to localStorage
    $('#save').on('click', function() {
        let contentToSave;
        if (isCodeView) {
            contentToSave = codeView.value;
            // Also sync back to editor for consistency
            editor.innerHTML = contentToSave;
        } else {
            contentToSave = editor.innerHTML;
        }

        const saveButton = document.getElementById("save");
        localStorage.setItem('KaspaHubEditor', contentToSave);

        saveButton.innerHTML = '<svg width="1em" height="1em" viewBox="0 0 20 20" fill="green"><circle cx="10" cy="10" r="10" /></svg>';

        // setTimeout(() => {
        //   saveButton.textContent = originalText;
        // }, 2000);

      });

    // Focus on editor
    $(editor).focus();
});
</script>
</body>
