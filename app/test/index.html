<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Progressive Web App</title>
    <meta name="msapplication-TileColor" content="#af0a1a">
    <meta name="theme-color" content="#ffffff">
    <link rel="shortcut icon" href="img/fav-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/fav-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/fav-16.png">
    <link rel="apple-touch-icon" href="img/fav-57.png">
    <link rel="apple-touch-icon" sizes="114x114" href="img/fav-114.png">
    <link rel="apple-touch-icon" sizes="72x72" href="img/fav-72.png">
    <link rel="apple-touch-icon" sizes="144x144" href="img/fav-144.png">
    <link rel="manifest" href="pwa-manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script type='text/javascript' src="js/main.js"></script>

    <link rel="stylesheet" href="/assets/styles/main.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

<style>
iframe {
    display: none;
}
.rwrap {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 7px;
    position: relative; 
    align-items: center;
    justify-content: center;


}

.e-button {
    min-height: 50px;
    max-height: 50px;
    min-width: 50px;
    max-width: 50px;
    font-size: 25px;

    border-radius: 50%;
    background-color: rgba(192,192,192, 0.4);
}
#calculator {
    display: flex;
    flex-direction: column;
    width: calc(14vw + 2.4vw);
}

#input, #result {
    border: none;
    outline: none;
    border-radius: 15px;
    padding-left: 10px;
    padding-right: 10px;
}
#input {

    background-color: rgba(192,192,192, 0.7);
    text-align: right;

}
#result {
    background-color: transparent;
    text-align: center;
}
    #calculator {
        width: 232px;
    }
@media (max-aspect-ratio: 0.7 / 1) {

    .e-button {
        min-height: 19vw;
        max-height: 19vw;
        min-width: 19vw;
        font-size: 5vw;
        border-radius: 50%;
    }
    #calculator {
    min-width: 100%;
    max-width: 100%;
    }
    .container-0 {
    min-width: 100%;
    max-width: 100%;
    }
    .wrapper-1 {
        margin: 0;
    }
    #input {
        font-size: 10vw;
        height: 16vw;
    }
    #result {
        font-size: 10vw;
    }
    footer {
        display: none;
    }
    html::-webkit-scrollbar {
        display: none;
    }

    html {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    main {
        min-width: 100%;
        max-width: 100%;
    }
}

</style>
</head>
<body class="">

<header>
<nav id="page-nav"><h2><a href="/">Kaspa Hub</a></h2><div class="toggle-theme"><input type="checkbox" id="theme-toggle"><label for="theme-toggle"></label></div></nav>
<script>const c=document.getElementById("theme-toggle");if(localStorage.getItem("dark")===null){c.checked=false;document.body.className="background-light"}else{c.checked=true;document.body.className="background-dark"}c.addEventListener("change",()=>{if(c.checked){localStorage.setItem("dark","");document.body.className="background-dark"}else{localStorage.removeItem("dark");document.body.className="background-light"}});</script>
</header>

<main style="margin: 0 auto; padding-bottom: 0;">

<div class="container-0 fade-in theme-1">

<div class="top-bar">
    <a draggable="false" href="/apps/"><svg width="1em" height="1em" viewBox="0 0 20 20" fill="#EC6A5E"><circle cx="10" cy="10" r="10" /></svg></a>
    <label>Text Editor</label>
    <button id="save"><svg width="1em" height="1em" viewBox="0 0 20 20" fill="gray"><circle cx="10" cy="10" r="10" /></svg></button>
</div>

<section id="calculator">
    <input type="text" id="input" oninput="updateResult()" placeholder="" />
    <input type="text" id="result" disabled />
<div class="rwrap theme-filter">
    <button class="e-button" style="color: orange;" onclick="clean()">C</button>
    <button class="e-button" onclick="append('(')">(</button>
    <button class="e-button" onclick="append(')')">)</button>
    <button class="e-button" onclick="backspace()">⌫</button>

    <button class="e-button" onclick="append('7')">7</button>
    <button class="e-button" onclick="append('8')">8</button>
    <button class="e-button" onclick="append('9')">9</button>
    <button class="e-button" onclick="append('/')">÷</button>

    <button class="e-button" onclick="append('4')">4</button>
    <button class="e-button" onclick="append('5')">5</button>
    <button class="e-button" onclick="append('6')">6</button>
    <button class="e-button" onclick="append('+')">+</button>
    <button class="e-button" onclick="append('1')">1</button>
    <button class="e-button" onclick="append('2')">2</button>
    <button class="e-button" onclick="append('3')">3</button>
    <button class="e-button" onclick="append('*')">x</button>

    <button class="e-button" onclick="append('0')">0</button>
    <button class="e-button" onclick="append('.')">.</button>
    <button class="e-button" onclick="append('-')">-</button>

    <button class="e-button" onclick="calculate()">=</button>
</div>
</section>
</div>

</main>
<footer><a href="https://kaspahub.org">Kaspa Community Hub</a>© 2025</footer>
<script>
const result = document.getElementById("result");
const input = document.getElementById("input");
const inputField = document.getElementById('input');
const saveButton = document.getElementById('save');



function append(value) {
    input.value += value;
    updateResult();
    result.focus();
}

function clean() {
    result.value = "";
    input.value = "";
}

function backspace() {
    input.value = input.value.slice(0, -1);
    updateResult();
}

function updateResult() {
 try {
    result.value = eval(input.value);
 } catch (error) {
    result.value = "";
 }
}

function calculate() {
try {
    input.value = eval(input.value);
    result.value = "";
    updateResult();
 } catch (error) {
    input.value = "";
    result.value = "";
 }
}



result.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
    event.preventDefault();
    calculate();
        updateResult();
    }
}); 


//save

window.onload = function () {
    const savedValue = localStorage.getItem('myInputValue');
    if (savedValue) {
        inputField.value = savedValue;
        setButtonGreen();
        updateResult();
        waitForAnyChange();
    }
};

saveButton.addEventListener('click', function () {
    const inputValue = inputField.value;
    localStorage.setItem('myInputValue', inputValue);
    setButtonGreen();
    waitForAnyChange();
});

function setButtonGreen() {
    saveButton.innerHTML = '<svg width="1em" height="1em" viewBox="0 0 20 20" fill="#61C554"><circle cx="10" cy="10" r="10" /></svg>';
}

function setButtonGray() {
    saveButton.innerHTML = '<svg width="1em" height="1em" viewBox="0 0 20 20" fill="gray"><circle cx="10" cy="10" r="10" /></svg>';
}

function waitForAnyChange() {
    const input = document.getElementById('input');
    let lastValue = input.value;

    const intervalId = setInterval(() => {
        if (input.value !== lastValue) {
            clearInterval(intervalId);
            setButtonGray();
        }
    }, 1000);
}




</script>
</body>
</html>
