<script src="https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/scripts/nostr.bundle.js"></script>
<script type="module">
'use strict';

(async () => {
    const widgetContainer = document.getElementById('container-r');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const npub = 'npub1jddxyapm56tvku2rexremlc7qz5cht2vplpcjdfhs23jtd7tykcs53rlmt';
    const relays = [
        'wss://nos.lol',
        'wss://relay.primal.net',
        'wss://relay.damus.io'
    ];
    const FIRST_RELAY_LIMIT = 7;
    const OTHER_RELAY_LIMIT = 50;
    const CHUNK_SIZE = 15;

    const pool = new window.NostrTools.SimplePool();
    let publicKey;
    try { 
        publicKey = window.NostrTools.nip19.decode(npub).data; 
        console.log("Decoded npub:", publicKey);
    } catch {
        widgetContainer.innerHTML = "Invalid npub.";
        console.error("Failed to decode npub");
        return; 
    }

    let userProfile = null;

    for (const relay of relays) {
        try {
            console.log(`Connecting to ${relay} for profile`);
            const events = await pool.querySync([relay], { kinds: [0], authors: [publicKey], limit: 1 });
            if (events?.length) {
                userProfile = JSON.parse(events[0].content);
                console.log(`Profile found on ${relay}:`, userProfile);
                break;
            }
        } catch (err) { 
            console.error(`Failed to query ${relay} for profile:`, err); 
        }
    }

    if (!userProfile) { 
        widgetContainer.innerHTML = "User profile not found."; 
        console.error("User profile not found on any relay");
        pool.close(relays); 
        return; 
    }

    const container = widgetContainer;
    let mergedPosts = new Map();
    let deletedPostIds = new Set();
    let firstRenderDone = false;
    let allPostsArray = [];
    let currentIndex = 0;

    function processPostContent(content) {
        const urlRegex = /(https:\/\/[^\s<>"']+)/g;
        const imageRegex = /(https:\/\/[^\s<>"']+\.(?:jpg|jpeg|png|gif|webp))/g;
        let processed = content.replace(imageRegex, url => `<img src="${url}" class="note-media">`);
        processed = processed.replace(urlRegex, url => !url.match(imageRegex) ? `<a href="${url}" target="_blank">${url}</a>` : url);
        return processed;
    }

    function createArticle(post) {
        const date = new Date(post.created_at * 1000).toLocaleString();
        const article = document.createElement('article');
        article.className = "theme-1 note";
        article.innerHTML = `
            <div class="note-user">
                <img src="${userProfile.picture || 'https://kaspahub.org/assets/logos/kaspahub.webp'}" style="width:50px;height:50px;border-radius:50%">
                <a style="color: inherit; text-decoration: none;" href="https://kaspahub.org/n/?user=${npub}">
                    <p style="font-weight:bold;margin:0">${userProfile.display_name || ''}</p>
                    <p style="color:#555;margin:0">@${userProfile.username || ''}</p>
                </a>
            </div>
            <p class="note-content">${processPostContent(post.content)}</p>
            <p style="color:#666;font-size:0.85em">Posted on ${date}</p>
        `;
        return article;
    }

    function renderPostsChunk(reset = false) {
        if (reset) {
            container.innerHTML = '';
            currentIndex = 0;
        }

        const chunk = allPostsArray.slice(currentIndex, currentIndex + CHUNK_SIZE);
        chunk.forEach(post => container.appendChild(createArticle(post)));
        currentIndex += chunk.length;

        loadMoreBtn.style.display = currentIndex < allPostsArray.length ? 'block' : 'none';
    }

    async function fetchPostsFromRelay(relay, limit) {
        try {
            console.log(`Connected to ${relay} for posts and deletions`);

            const deletionEvents = await pool.querySync([relay], { kinds: [5], authors: [publicKey] });
            deletionEvents.forEach(ev => {
                ev.tags.filter(tag => tag[0]==='e')
                       .map(tag => tag[1])
                       .forEach(id => deletedPostIds.add(id));
            });
            console.log(`Fetched ${deletionEvents.length} deletion events from ${relay}`);

            const events = await pool.querySync([relay], { kinds: [1], authors: [publicKey], limit });
            const posts = [];
            events.forEach(ev => {
                const isReply = ev.tags.some(tag => tag[0] === 'e');
                if (!isReply && !deletedPostIds.has(ev.id)) posts.push(ev);
            });
            console.log(`Fetched ${posts.length} posts from ${relay}`);

            if (!firstRenderDone && posts.length > 0) {
                console.log(`First render using ${posts.length} posts from ${relay}`);
                allPostsArray = posts.slice(0, FIRST_RELAY_LIMIT);
                renderPostsChunk(true);
                firstRenderDone = true;
            }

            return posts;
        } catch (err) { 
            console.error(`Failed to query ${relay} for posts:`, err); 
            return []; 
        }
    }

    const postsPromises = relays.map((relay, i) => fetchPostsFromRelay(relay, i === 0 ? FIRST_RELAY_LIMIT : OTHER_RELAY_LIMIT));
    const allPostsByRelay = await Promise.all(postsPromises);

    // merge, dedupe, sort
    allPostsByRelay.flat().forEach(ev => { if (!mergedPosts.has(ev.id)) mergedPosts.set(ev.id, ev); });
    allPostsArray = Array.from(mergedPosts.values()).sort((a,b) => b.created_at - a.created_at);

    console.log(`Total merged posts: ${allPostsArray.length}`);

    renderPostsChunk(true);

    if (allPostsArray.length > CHUNK_SIZE) loadMoreBtn.style.display = 'block';

    loadMoreBtn.addEventListener('click', () => renderPostsChunk());

    pool.close(relays);
})();
</script>
