<script type="module">
'use strict';

(async () => {
    const widgetContainer = document.getElementById('container-r');
    if (!widgetContainer) return;

    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const npubs = ['npub1jddxyapm56tvku2rexremlc7qz5cht2vplpcjdfhs23jtd7tykcs53rlmt'];
    const relays = ['wss://nos.lol', 'wss://relay.primal.net', 'wss://relay.damus.io'];

    const FIRST_RELAY_LIMIT = 10;
    const OTHER_RELAY_LIMIT = 60;
    const CHUNK_SIZE = 20;

    const pool = new window.NostrTools.SimplePool();

    let publicKeys = [];
    try {
        publicKeys = npubs.map(npub => window.NostrTools.nip19.decode(npub).data);
    } catch {
        widgetContainer.innerHTML = '<p class="error">Invalid npub format.</p>';
        pool.close(relays);
        return;
    }

    const profiles = new Map();
    await Promise.all(relays.map(async relay => {
        try {
            const events = await pool.querySync([relay], { kinds: [0], authors: publicKeys, limit: 2 });
            events.forEach(ev => {
                if (!profiles.has(ev.pubkey) || ev.created_at > (profiles.get(ev.pubkey)?.created_at ?? 0)) {
                    try {
                        profiles.set(ev.pubkey, JSON.parse(ev.content));
                    } catch {}
                }
            });
        } catch {}
    }));

    if (profiles.size === 0) {
        widgetContainer.innerHTML = '<p class="error">User profiles not found.</p>';
        pool.close(relays);
        return;
    }

    const deletedPostIds = new Set();
    await Promise.all(relays.map(async relay => {
        try {
            const delEvents = await pool.querySync([relay], { kinds: [5], authors: publicKeys, limit: 200 });
            delEvents.forEach(ev => {
                ev.tags
                    .filter(tag => tag[0] === 'e')
                    .forEach(tag => deletedPostIds.add(tag[1]));
            });
        } catch {}
    }));

    const mergedPosts = new Map();
    let allPostsArray = [];
    let currentIndex = 0;

    function processPostContent(content) {
        const urlRegex = /(https:\/\/[^\s<>"']+)/g;
        const isImage = url => /\.(?:jpg|jpeg|png|gif|webp)$/i.test(url);

        return content.replace(urlRegex, url => {
            if (isImage(url)) {
                return `<img src="${url}" class="note-media" loading="lazy" alt="Nostr image">`;
            }
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

    function createArticle(post) {
        const profile = profiles.get(post.pubkey) || {
            picture: 'https://kaspahub.org/assets/logos/kaspahub.webp',
            display_name: '',
            name: ''
        };

        const npub = window.NostrTools.nip19.npubEncode(post.pubkey);
        const noteId = window.NostrTools.nip19.noteEncode(post.id);
        const dateStr = formatDate(post.created_at * 1000);

        const article = document.createElement('article');
        article.className = "theme-1 note";
        article.innerHTML = `
            <div class="note-user">
                <img src="${profile.picture || 'https://kaspahub.org/assets/logos/kaspahub.webp'}" 
                     style="width:50px;height:50px;border-radius:50%" 
                     alt="${profile.display_name || profile.name}">
                <a href="https://primal.net/p/${npub}" style="color:inherit;text-decoration:none;">
                    <p style="font-weight:bold;margin:0">${profile.display_name || profile.name || 'Anonymous'}</p>
                    <span class="muted">@${profile.username || profile.name || post.pubkey.slice(0, 8)}</span>
                </a>
            </div>
            <p class="note-content">${processPostContent(post.content)}</p>
            <p class="muted note-footer">
                <a href="https://primal.net/e/${noteId}" 
                   style="color:inherit;text-decoration:none;" 
                   target="_blank" rel="noopener">
                    ${dateStr}
                </a>
            </p>
        `;
        return article;
    }

    function renderPostsChunk(reset = false) {
        if (reset) {
            widgetContainer.innerHTML = '';
            currentIndex = 0;
        }

        const chunk = allPostsArray.slice(currentIndex, currentIndex + CHUNK_SIZE);
        if (chunk.length === 0) return;

        const fragment = document.createDocumentFragment();
        chunk.forEach(post => fragment.appendChild(createArticle(post)));

        widgetContainer.appendChild(fragment);
        currentIndex += chunk.length;

        if (loadMoreBtn) {
            loadMoreBtn.style.display = currentIndex < allPostsArray.length ? 'block' : 'none';
        }
    }

    async function fetchPostsFromRelay(relay, limit) {
        try {
            const events = await pool.querySync([relay], {
                kinds: [1],
                authors: publicKeys,
                limit
            });

            const validPosts = [];
            for (const ev of events) {
                const isReply = ev.tags.some(t => t[0] === 'e' && t[1]);
                if (!isReply && !deletedPostIds.has(ev.id)) {
                    validPosts.push(ev);
                }
            }
            return validPosts;
        } catch {
            return [];
        }
    }

    function updateFeed(newPosts) {
        let changed = false;
        for (const post of newPosts) {
            if (!mergedPosts.has(post.id)) {
                mergedPosts.set(post.id, post);
                changed = true;
            }
        }

        if (!changed) return;

        allPostsArray = Array.from(mergedPosts.values())
            .sort((a, b) => b.created_at - a.created_at);

        renderPostsChunk(true);
    }

    const menuCheck = document.getElementById('menuCheck');
    if (menuCheck) menuCheck.classList.add('menuBusy');

    try {
        const postsPromises = relays.map((relay, index) => {
            const limit = index === 0 ? FIRST_RELAY_LIMIT : OTHER_RELAY_LIMIT;
            return fetchPostsFromRelay(relay, limit)
                .then(posts => {
                    updateFeed(posts);
                    return posts;
                });
        });

        await Promise.all(postsPromises);

        if (allPostsArray.length > 0) {
            renderPostsChunk(true);
        } else {
            widgetContainer.innerHTML = '<p class="empty">No posts found.</p>';
        }
    } finally {
        if (menuCheck) menuCheck.classList.remove('menuBusy');
        pool.close(relays);
    }

    if (loadMoreBtn) {
        loadMoreBtn.addEventListener('click', () => renderPostsChunk());
    }
})();
</script>
