<script src="https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/scripts/nostr.bundle.js"></script>
<script type="module">
'use strict';

(async () => {
    const widgetContainer = document.getElementById('container-r');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const npubs = ['npub1jddxyapm56tvku2rexremlc7qz5cht2vplpcjdfhs23jtd7tykcs53rlmt', 'npub1sg6plzptd64u62a878hep2kev88swjh3tw00gjsfl8f237lmu63q0uf63m'];
    const relays = ['wss://nos.lol', 'wss://relay.primal.net', 'wss://relay.damus.io'];
    const FIRST_RELAY_LIMIT = 7;
    const OTHER_RELAY_LIMIT = 50;
    const CHUNK_SIZE = 15;

    const pool = new window.NostrTools.SimplePool();

    let publicKeys = [];
    try {
        publicKeys = npubs.map(npub => window.NostrTools.nip19.decode(npub).data);
    } catch {
        widgetContainer.innerHTML = "Invalid npub.";
        return;
    }

    let profiles = new Map();
    let profileEvents = new Map();
    await Promise.all(relays.map(async relay => {
        try {
            const events = await pool.querySync([relay], { kinds: [0], authors: publicKeys });
            events.forEach(ev => {
                const pk = ev.pubkey;
                if (!profileEvents.has(pk) || ev.created_at > profileEvents.get(pk).created_at) {
                    profileEvents.set(pk, ev);
                }
            });
        } catch {}
    }));
    profileEvents.forEach(ev => {
        try {
            profiles.set(ev.pubkey, JSON.parse(ev.content));
        } catch {}
    });
    if (profiles.size === 0) {
        widgetContainer.innerHTML = "User profiles not found.";
        pool.close(relays);
        return;
    }

    const container = widgetContainer;
    let mergedPosts = new Map();
    let deletedPostIds = new Set();
    let allPostsArray = [];
    let currentIndex = 0;

    function formatDate(timestamp) {
        const date = new Date(timestamp * 1000);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        if (diffMins < 1) return 'just now';
        if (diffMins < 60) return `${diffMins}m`;
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 24) return `${diffHours}h`;
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function processPostContent(content) {
        const urlRegex = /(https:\/\/[^\s<>"']+)/g;
        const imageRegex = /(https:\/\/[^\s<>"']+\.(?:jpg|jpeg|png|gif|webp))/g;
        let processed = content.replace(imageRegex, url => `<img src="${url}" class="note-media" loading="lazy" alt="">`);
        processed = processed.replace(urlRegex, url => !url.match(imageRegex) ? `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>` : url);
        return processed;
    }

    function createArticle(post) {
        const date = formatDate(post.created_at);
        const article = document.createElement('article');
        article.className = "theme-1 note";
        const profile = profiles.get(post.pubkey) || { picture: 'https://kaspahub.org/assets/logos/kaspahub.webp', display_name: '', name: '' };
        const npubForLink = window.NostrTools.nip19.npubEncode(post.pubkey);
        article.innerHTML = `
            <div class="note-user">
                <img src="${profile.picture || 'https://kaspahub.org/assets/logos/kaspahub.webp'}" style="width:50px;height:50px;border-radius:50%" loading="lazy" alt="">
                <a style="color: inherit; text-decoration: none;" href="https://primal.net/p/${npubForLink}">
                    <p style="font-weight:bold;margin:0">${profile.display_name || profile.name || 'Nostr User'}</p>
                    <span class="muted">@${profile.username || profile.name || ''}</span>
                </a>
            </div>
            <p class="note-content">${processPostContent(post.content)}</p>
            <p class="muted" style="font-size:0.85em">${date}</p>
        `;
        return article;
    }

    function renderPostsChunk(reset = false) {
        if (reset) {
            container.innerHTML = '';
            currentIndex = 0;
        }
        const chunk = allPostsArray.slice(currentIndex, currentIndex + CHUNK_SIZE);
        chunk.forEach(post => container.appendChild(createArticle(post)));
        currentIndex += chunk.length;
        loadMoreBtn.style.display = currentIndex < allPostsArray.length ? 'block' : 'none';
    }

    async function fetchPostsFromRelay(relay, limit) {
        try {
            const events = await pool.querySync([relay], { kinds: [1], authors: publicKeys, limit });
            return events;
        } catch {
            return [];
        }
    }

    const menuCheck = document.getElementById('menuCheck');
    if (menuCheck) menuCheck.classList.add('menuBusy');

    try {
        const deletionsPromise = Promise.all(relays.map(async relay => {
            try {
                const deletionEvents = await pool.querySync([relay], { kinds: [5], authors: publicKeys });
                deletionEvents.forEach(ev => {
                    ev.tags
                        .filter(tag => tag[0] === 'e' && tag[1])
                        .forEach(tag => deletedPostIds.add(tag[1]));
                });
            } catch {}
        }));

        const cleanDeleted = () => {
            let changed = false;
            deletedPostIds.forEach(id => {
                if (mergedPosts.has(id)) {
                    mergedPosts.delete(id);
                    changed = true;
                }
            });
            if (changed) {
                allPostsArray = Array.from(mergedPosts.values()).sort((a, b) => b.created_at - a.created_at);
                renderPostsChunk(true);
            }
        };
        deletionsPromise.then(cleanDeleted);

        const updateFeed = newPosts => {
            let changed = false;
            newPosts.forEach(ev => {
                if (!mergedPosts.has(ev.id) && !deletedPostIds.has(ev.id)) {
                    mergedPosts.set(ev.id, ev);
                    changed = true;
                }
            });
            if (changed) {
                allPostsArray = Array.from(mergedPosts.values()).sort((a, b) => b.created_at - a.created_at);
                renderPostsChunk(true);
            }
        };

        const postsPromises = relays.map((relay, i) => {
            const limit = i === 0 ? FIRST_RELAY_LIMIT : OTHER_RELAY_LIMIT;
            return fetchPostsFromRelay(relay, limit).then(posts => {
                updateFeed(posts);
                return posts;
            });
        });

        await Promise.all(postsPromises);
    } finally {
        if (menuCheck) menuCheck.classList.remove('menuBusy');
    }

    loadMoreBtn.addEventListener('click', () => renderPostsChunk());

    pool.close(relays);
})();
</script>
