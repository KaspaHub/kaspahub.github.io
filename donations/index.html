<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="robots" content="noindex, nofollow" />
	
	<title>Kaspa Donation Link</title>
	<meta name="twitter:title" content="Kaspa Donation Link" />
	<meta property="og:title" content="Kaspa Donation Link" />

	<meta name="twitter:card" content="summary" />
	<meta name="twitter:image" content="https://kaspahub.org/assets/logo.jpg" />
	<meta property="og:image" content="https://kaspahub.org/assets/logo.jpg" />

	<meta name="twitter:site" content="@KaspaHub" />
	<meta name="twitter:creator" content="@KaspaHub" />
	<meta property="og:site_name" content="Kaspa Hub" />

	<meta name="theme-color" content="#000000" />
	<link rel="stylesheet" href="https://kaspahub.org/assets/styles/main.css" />
	<link rel="manifest" href="https://kaspahub.org/assets/manifest.json" />
	<link rel="apple-touch-icon" sizes="180x180" href="https://kaspahub.org/assets/logo-180.png" />
	<link rel="icon" type="image/png" sizes="32x32" href="https://kaspahub.org/assets/logo-32.png">
	<link rel="icon" type="image/x-icon" href="/favicon.ico">

	<script src="https://kaspahub.org/assets/scripts/jquery.js"></script>
	<script src="https://kaspahub.org/assets/scripts/jquery-qrcode.js"></script>
<style>
main {
	display: flex;
	flex-direction: column;
	align-items: center;
}
#page-title {
	margin-bottom: 20px;
}
#text-display {
	max-width: 600px;
	text-align: center;
	font-size: 1.2rem;
	word-wrap: break-word;
}
.button {
	width: 200px;
	margin: 20px 0;
}
#open-button {
	color: white;
	text-decoration: none;
	font-weight: inherit;
}
</style>
</head>

<body class="">
	
<header>
<nav id="page-nav"><h2><a href="/">Kaspa Hub</a></h2><div class="toggle-theme"><input type="checkbox" id="theme-toggle"><label for="theme-toggle"></label></div></nav>
<script>const c=document.getElementById("theme-toggle");if(localStorage.getItem("dark")===null){c.checked=false;document.body.className="background-light"}else{c.checked=true;document.body.className="background-dark"}c.addEventListener("change",()=>{if(c.checked){localStorage.setItem("dark","");document.body.className="background-dark"}else{localStorage.removeItem("dark");document.body.className="background-light"}});</script>
</header>
	
<main class="container">
<h1 id="page-title">Kaspa Donations</h1>
<div id="text-display" class="theme-1">Loading...</div>
<div class="qr-code" id="qr-code"></div>
<button class="button" id="copy-button" style="display:none;">Copy Wallet Address</button>
<a class="button" id="open-button" style="display: none;" href="" target="_blank">Open Wallet</a>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
	const urlParams = new URLSearchParams(window.location.search);
	const rawWallet = urlParams.get("wallet");
	const rawHandle = urlParams.get("handle");
	
	const displayElement = document.getElementById("text-display");
	const titleElement = document.getElementById("page-title");
	const qrCodeElement = document.getElementById("qr-code");
	const copyButton = document.getElementById("copy-button");
	const openButton = document.getElementById("open-button");

	
	function setMetaTag(name, content) {
		const meta = document.createElement('meta');
		meta.setAttribute('name', name);
		meta.setAttribute('content', content);
		document.head.appendChild(meta);
	}

	if (rawHandle) {
		const decodedHandle = decodeURIComponent(rawHandle);
		document.title = '@' + decodedHandle;
		titleElement.innerHTML = `<a href="https://x.com/${decodedHandle}" target="_blank" rel="noopener noreferrer">@${decodedHandle}</a>`;
		setMetaTag('kaspa:title', '@' + decodedHandle);
	}

	if (rawWallet) {
		const decodedWallet = decodeURIComponent(rawWallet);
		const kaspaRegex = /^kaspa:[a-zA-Z0-9]{50,72}$/;
		
		if (!kaspaRegex.test(decodedWallet)) {
			displayElement.innerHTML = "<span class='error'>Invalid Kaspa wallet address format.</span>";
			return;
		}

	displayElement.textContent = decodedWallet;

	$('#qr-code').qrcode({
		render: 'image',
		text: decodedWallet,
		size: 256,
		quiet: 3
	});

	copyButton.style.display = "inline-block";

	copyButton.addEventListener('click', () => {
		navigator.clipboard.writeText(decodedWallet).then(() => {
			const originalText = copyButton.textContent;
			copyButton.textContent = 'Copied!';
			setTimeout(() => {
				copyButton.textContent = originalText;
			}, 1500);
		});
	});

	if (window.innerHeight > window.innerWidth) {
		openButton.style.display = "inline-block";
		openButton.href = decodedWallet;
	}
		
	setMetaTag('kaspa:wallet', decodedWallet);

	} else {
		displayElement.textContent = "No 'wallet' parameter found in the URL.";
	}
});
</script>
</body>
</html>
