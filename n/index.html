<!DOCTYPE html>
<html lang="en" id="">
<head>
<script>document.documentElement.id = localStorage.getItem('dark') !== null ? 'dark' : 'light';</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<link rel="stylesheet" type="text/css" href="/assets/styles/main.css" />
<link rel="preload" as="font" type="font/woff2" crossorigin="anonymous" href="/assets/fonts/mulish.woff2" />
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="manifest" href="/assets/manifest.json" />

<title>Kaspa Link</title>

<link rel="canonical" href="https://kaspahub.org/reviews/" />
<meta name="twitter:url" content="https://kaspahub.org/reviews/" />
<meta property="og:url" content="https://kaspahub.org/reviews/" />

<meta name="twitter:card" content="summary" />
<meta name="twitter:image" content="https://kaspahub.org/assets/logo.jpg" />
<meta property="og:image" content="https://kaspahub.org/assets/logo.jpg" />

<meta name="twitter:site" content="@KaspaHub" />
<meta name="robots" content="noindex, nofollow" />

<style>
main {
    display: flex;
    flex-direction: column;
    align-items: center;
}
#about {
    margin: 10px;
}
#open-button {
    color: white;
    text-decoration: none;
    font-weight: inherit;
    width: 200px;
    margin: 20px 0;
}
.copy-button {
    width: 200px;
    margin: 20px 0;
}
.button {
    margin: 20px 0;
}
.theme-1 {
    border-radius: 25px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    max-width: 800px;
    min-height: 300px;
    width: 100%;
}
#picture {
    flex-shrink: 0;
    height: 150px;
    width: 150px;
    overflow: hidden;
    border-radius: 50%;
}
@media (max-width: 700px) {
    #picture {
        height: 100px;
        width: 100px;
    }
}

#posts {
    margin-top: 20px;
    width: 100%;
}
.post {
    border-top: 1px solid #dddddd73;
    padding: 10px 0;
}
.post p {
    white-space: pre-wrap;
    margin: 5px 0;
}
.post img {
    margin: 5px;
}
.post .timestamp {
    color: #666;
    font-size: 0.9em;
}
#searchContainer {
    display: flex;
    flex-direction: row;
    min-width: 100%;
}
#searchContainer > * {
    margin: 10px;
}
#searchBtn {
    align-self: end;
}
#searchBox {
    max-height: 45px;
}

.menu-button {
    width: 30px;
    height: 30px;
    opacity: 0.9;
    cursor: pointer;
    position: relative;
    display: none;
}

.popup-menu {
    position: absolute;
    top: 35px;
    left: -140px;
    background-color: #333;
    color: white;
    border-radius: 4px;
    display: none;
    min-width: 180px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    z-index: 10;
}

.popup-menu a {
    display: block;
    padding: 8px 12px;
    color: white;
    text-decoration: none;
    cursor: pointer;
}

.popup-menu a:hover {
    background-color: #555;
}
</style>
</head>
<body>

<nav id="navBar"><input id="menu" type="button" aria-label="Menu Toggle" onclick="menu()" /><a id="title" href="/">Kaspa Hub</a><input id="theme" type="checkbox" aria-label="Theme Toggle" onclick="theme()" /></nav><script async src="/assets/scripts/main.js"></script>

<main id="container-1">
<div class="theme-1 fade-in">
<div style="display: flex; justify-content: space-between;">

    <div style="display: flex; gap: 20px;">
        <div id="picture"></div>
        <div>
            <h1 id="display_name"></h1>
            <h3 id="name" style="opacity: 0.75;"></h3>
        </div>
    </div>

    <div class="menu-button" id="menuButton">

    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="20" fill="#333"/>
      <circle cx="10" cy="20" r="3" fill="#fff"/>
      <circle cx="20" cy="20" r="3" fill="#fff"/>
      <circle cx="30" cy="20" r="3" fill="#fff"/>
    </svg>

    <div class="popup-menu" id="popupMenu"></div>

    </div>

</div>

<div id="about"><div class="fade-in" id="loading"><span class="spinner"></span><span>Loading data…</span></div></div>
<div id="qr-code" style="margin: 20px 0px; justify-content: space-around; display: flex;"></div>

<div style="display: flex; flex-direction: column; align-items: center;">
    <button class="copy-button" id="copy-button" style="display: none;">Copy Wallet Address</button>
    <!-- <a class="button" id="open-button" style="display: none;" href="" target="_blank">Open Wallet</a> -->
</div>

<div id="error" style="color: red; margin-top: 10px;"></div>
<div id="posts"><div class="fade-in"><span class="spinner"></span></div></div>
</div>
</main>

<script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
<script src="/assets/scripts/jquery.js"></script>
<script src="/assets/scripts/jquery-qrcode.js"></script>
<script type="module">
document.addEventListener("DOMContentLoaded", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const npub = urlParams.get('user');
    const usernameElement = document.getElementById("name");
    const displaynameElement = document.getElementById("display_name");
    const pictureElement = document.getElementById("picture");
    const aboutElement = document.getElementById("about");
    const qrCodeElement = document.getElementById("qr-code");
    const copyButton = document.getElementById("copy-button");
    const errorDiv = document.getElementById("error");
    const postsElement = document.getElementById("posts");
    const containerElement = document.getElementById("container-1");
    const openButton = document.getElementById("open-button");


    const relays = [
        'wss://relay.primal.net',
        'wss://relay.damus.io',
        'wss://nostr.bitcoiner.social',
        'wss://relay.nos.social'
        // 'wss://nos.lol',
        // 'wss://nostr.mom',
        // 'wss://nostr.oxtr.dev',
        // 'wss://relay.0xchat.com',
        // 'wss://relay.nostr.band',
        // 'wss://relay.noswhere.com'
    ];

    const POST_LIMIT = 10;
    const DISPLAY_LIMIT = 3;

    function setMetaTag(name, content) {
        const meta = document.createElement('meta');
        meta.setAttribute('name', name);
        meta.setAttribute('content', content);
        document.head.appendChild(meta);
    }

function processPostContent(content) {
    const urlRegex = /(https:\/\/[^\s<>"']+)/g;
    const imageRegex = /(https:\/\/[^\s<>"']+\.(?:jpg|jpeg|png|gif|webp))/g;

    let processedContent = content.replace(imageRegex, (url) => {
        return `<img src="${url}" alt="Post image" style="max-width: 100%; height: auto;" />`;
    });

    processedContent = processedContent.replace(urlRegex, (url) => {
        if (!url.match(imageRegex)) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        }
        return url;
    });

    return processedContent;
}

    if (!npub) {
        aboutElement.textContent = "";
        errorDiv.textContent = "";
        containerElement.innerHTML = `
<h3>Enter Your Nostr Public Key</h3>
<div id="searchContainer">
    <input type="text" id="searchBox" placeholder="npub1jddxyapm56tvku2rexremlc7qz5cht2vplpcjdfhs23jtd7tykcs53rlmt" required="">
    <button class="button" id="searchBtn">Search</button>
</div>
`;
        return;
    }

    let publicKey;
    try {
        if (npub.startsWith('npub')) {
            publicKey = window.NostrTools.nip19.decode(npub).data;
        } else {
            publicKey = npub;
        }
    } catch (err) {
        aboutElement.textContent = "Invalid npub provided.";
        errorDiv.textContent = "Error: " + err.message;
        postsElement.innerHTML = "";
        return;
    }

    const pool = new window.NostrTools.SimplePool();
    let userProfile = null;

    function isValidKaspaAddress(address) {
        return address && address.startsWith('kaspa:');
    }

    for (const relay of relays) {
        try {
            const relayConn = await pool.ensureRelay(relay);
            console.log(`Connected to ${relay} for profile`);
            const filter = { kinds: [0], authors: [publicKey], limit: 1 };
            const events = await pool.querySync([relay], filter);

            if (events && events.length > 0) {
                const event = events[0];
                const profile = JSON.parse(event.content);
                if (isValidKaspaAddress(profile.kaspa)) {
                    userProfile = profile;
                    break;
                }
            }
        } catch (err) {
            console.error(`Failed to query ${relay} for profile:`, err);
        }
    }

    if (!userProfile || !isValidKaspaAddress(userProfile.kaspa)) {
        aboutElement.innerHTML = `<span class='error'>No user found with npub <strong>${npub}</strong> or no valid Kaspa wallet address.</span>`;
        postsElement.innerHTML = "";
        pool.close(relays);
        return;
    }

const menuItems = [];
menuItems.push(`<a href="#" onclick="navigator.clipboard.writeText('${npub}')">Copy Public Key</a>`);
// menuItems.push(`<a href="https://primal.net/p/${npub}" target="_blank">View on Primal</a>`);
if (userProfile.website && userProfile.website.startsWith('http')) {
    menuItems.push(`<a href="${userProfile.website}" target="_blank">Visit Website</a>`);
}
if (userProfile.lud16 && userProfile.lud16.includes('@')) {
    menuItems.push(`<a href="#" onclick="navigator.clipboard.writeText('${userProfile.lud16}')">Copy Lightning</a>`);
}
popupMenu.innerHTML = menuItems.join('');

    if (userProfile.picture && userProfile.picture.startsWith('https:')) {
        pictureElement.innerHTML = `<img src="${userProfile.picture}" onerror="this.src='https://kaspahub.org/assets/icons/user.svg'">`;
    } else {
        pictureElement.innerHTML = `<img src="https://kaspahub.org/assets/icons/user.svg" alt="Profile Picture">`;
    }

    if (userProfile.display_name) {
        displaynameElement.innerHTML = userProfile.display_name;
    }

    if (userProfile.about) {
        aboutElement.innerHTML = userProfile.about;
    } else {
        aboutElement.innerHTML = "";
    }

    if (userProfile.kns) {
        usernameElement.innerHTML = userProfile.kns;
        document.title = userProfile.kns;
        setMetaTag('kaspa:title', userProfile.kns);
    } else if (userProfile.username) {
        usernameElement.innerHTML = `@${userProfile.username}`;
        document.title = `@${userProfile.username}`;
        setMetaTag('kaspa:title', '@' + userProfile.username);
    } else if (userProfile.display_name) {
        document.title = userProfile.display_name;
        setMetaTag('kaspa:title', userProfile.display_name);
    } else {
        const fallbackName = npub.slice(0, 8);
        usernameElement.innerHTML = fallbackName;
        document.title = fallbackName;
        setMetaTag('kaspa:title', fallbackName);
    }

    button.style.display = 'inline-block';

    const walletAddress = userProfile.kaspa;

    $('#qr-code').qrcode({
        render: 'image',
        text: walletAddress,
        size: 256,
        quiet: 3
    });

    $('#qr-code img').addClass('qr-code');

    copyButton.style.display = "inline-block";
    copyButton.addEventListener('click', () => {
        navigator.clipboard.writeText(walletAddress).then(() => {
            const originalText = copyButton.textContent;
            copyButton.textContent = 'Copied!';
            setTimeout(() => {
                copyButton.textContent = originalText;
            }, 1500);
        });
    });

    if (window.innerHeight > window.innerWidth) {
        openButton.style.display = "inline-block";
        openButton.href = walletAddress;
    }

    setMetaTag('kaspa:wallet', walletAddress);

    let userPosts = new Map();
    let deletedPostIds = new Set();

    for (const relay of relays) {
        try {
            const relayConn = await pool.ensureRelay(relay);
            console.log(`Connected to ${relay} for posts and deletions`);

            const deletionFilter = { kinds: [5], authors: [publicKey] };
            const deletionEvents = await pool.querySync([relay], deletionFilter);
            deletionEvents.forEach(event => {
                const deletedEventIds = event.tags.filter(tag => tag[0] === 'e').map(tag => tag[1]);
                deletedEventIds.forEach(id => deletedPostIds.add(id));
            });

            const postFilter = { kinds: [1], authors: [publicKey], limit: POST_LIMIT };
            const events = await pool.querySync([relay], postFilter);
            if (events && events.length > 0) {
                events.forEach(event => {
                    const isReply = event.tags.some(tag => tag[0] === 'e');
                    if (!isReply && !userPosts.has(event.id) && !deletedPostIds.has(event.id)) {
                        userPosts.set(event.id, event);
                    }
                });
            }
        } catch (err) {
            console.error(`Failed to query ${relay} for posts or deletions:`, err);
        }
    }

    pool.close(relays);

    const sortedPosts = Array.from(userPosts.values())
        .sort((a, b) => b.created_at - a.created_at)
        .slice(0, DISPLAY_LIMIT);

    if (sortedPosts.length > 0) {
        postsElement.innerHTML = '<h3>Recent Posts</h3>';
        sortedPosts.forEach(post => {
            const date = new Date(post.created_at * 1000).toLocaleString();
            const postElement = document.createElement('div');
            postElement.className = 'post';
            const processedContent = processPostContent(post.content);
            postElement.innerHTML = `
                <p>${processedContent}</p>
                <p class="timestamp">Posted on ${date}</p>
            `;
            postsElement.appendChild(postElement);
        });
    } else {
        postsElement.innerHTML = '<p></p>';
    }
});

//
    const button = document.getElementById('menuButton');
    const menu = document.getElementById('popupMenu');

button.addEventListener('click', (e) => {
e.stopPropagation();
menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
menu.style.display = 'none';
});
//
function runSearch(npub) {
    if (npub) {
        window.location.href = `https://kaspahub.org/n/?user=${npub}`;
    }
}

document.addEventListener('click', function(e) {
    if (e.target.id === 'searchBtn') {
        runSearch(document.getElementById('searchBox')?.value);
    }
});

document.addEventListener('keydown', function(e) {
    if (e.target.id === 'searchBox' && e.key === 'Enter') {
        runSearch(e.target.value);
    }
});
</script>
</body>
</html>
