<script src="https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/scripts/qrious.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/scripts/nostr.bundle.js"></script>
<script type="text/javascript">
'use strict';

document.addEventListener("DOMContentLoaded", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const npub = urlParams.get('user');
    const usernameElement = document.getElementById("name");
    const displaynameElement = document.getElementById("display_name");
    const pictureElement = document.getElementById("picture");
    const aboutElement = document.getElementById("about");
    const qrCodeElement = document.getElementById("qr-code");
    const errorDiv = document.getElementById("error");
    const profileSection = document.getElementById("profile-section");
    const searchSection = document.getElementById("search-section");
    const nMenuBtn = document.getElementById('nMenuBtn');
    const popupMenu = document.getElementById('popupMenu');

    const relays = [
        'wss://relay.damus.io',
        'wss://nos.lol',
        'wss://relay.primal.net'
    ];

    function setMetaTag(name, content) {
        const meta = document.createElement('meta');
        meta.setAttribute('name', name);
        meta.setAttribute('content', content);
        document.head.appendChild(meta);
    }

    if (!npub) {
        searchSection.style.display = "block";
    } else {
        profileSection.style.display = "block";

    let publicKey;
    try {
        if (npub.startsWith('npub')) {
            publicKey = window.NostrTools.nip19.decode(npub).data;
        } else {
            publicKey = npub;
        }
    } catch (err) {
        aboutElement.textContent = "Invalid npub provided.";
        errorDiv.textContent = "Error: " + err.message;
        return;
    }

    const pool = new window.NostrTools.SimplePool();
    let userProfile = null;

    function isValidKaspaAddress(address) {
        return address && address.startsWith('kaspa:');
    }

    for (const relay of relays) {
        try {
            const relayConn = await pool.ensureRelay(relay);
            console.log(`Connected to ${relay} for profile`);
            const filter = { kinds: [0], authors: [publicKey], limit: 1 };
            const events = await pool.querySync([relay], filter);

            if (events && events.length > 0) {
                const event = events[0];
                const profile = JSON.parse(event.content);
                if (isValidKaspaAddress(profile.kaspa)) {
                    userProfile = profile;
                    break;
                }
            }
        } catch (err) {
            console.error(`Failed to query ${relay} for profile:`, err);
        }
    }

    if (!userProfile || !isValidKaspaAddress(userProfile.kaspa)) {
        aboutElement.innerHTML = `<span class='error'>No user found with npub <strong>${escHtml(npub)}</strong> or no valid Kaspa wallet address.</span>`;
        pool.close(relays);
        return;
    }

    const escapedNpub = escHtml(npub);
    const escapedDisplayName = userProfile.display_name ? escHtml(userProfile.display_name) : '';
    const escapedUsername = userProfile.username ? escHtml(userProfile.username) : '';
    const escapedAbout = userProfile.about ? escHtml(userProfile.about) : '';
    const pictureUrl = userProfile.picture && userProfile.picture.startsWith('https:') ? userProfile.picture : '';
    const escapedPictureUrl = pictureUrl ? escHtml(pictureUrl) : '';
    const websiteUrl = userProfile.website && userProfile.website.startsWith('http') ? userProfile.website : '';
    const escapedWebsiteUrl = websiteUrl ? escHtml(websiteUrl) : '';
    const lud16 = userProfile.lud16 && userProfile.lud16.includes('@') ? userProfile.lud16 : '';
    const walletAddress = userProfile.kaspa;
    const escapedWalletAddress = escHtml(walletAddress);

    const menuItems = [];
    menuItems.push(`<a href="https://kaspahub.org/nostr/register/">Sign up</a><button type="button" data-copy-npub>Copy Public Key</button>`);
    if (lud16) {
        menuItems.push(`<button type="button" data-copy-lud16>Copy Lightning</button>`);
    }
    if (websiteUrl) {
        menuItems.push(`<a href="${escapedWebsiteUrl}" target="_blank">Visit Website</a>`);
    }
    popupMenu.innerHTML = menuItems.join('');

    const npubBtn = popupMenu.querySelector('[data-copy-npub]');
    if (npubBtn) {
        npubBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(npub);
        });
    }
    const ludBtn = popupMenu.querySelector('[data-copy-lud16]');
    if (ludBtn) {
        ludBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(lud16);
        });
    }

    if (escapedPictureUrl) {
        pictureElement.innerHTML = `<img draggable="false" class="pfp" src="${escapedPictureUrl}" onerror="this.src='https://kaspahub.org/assets/icons/user.svg'">`;
    } else {
        pictureElement.innerHTML = `<img draggable="false" class="pfp" src="https://kaspahub.org/assets/icons/user.svg" alt="Profile Picture">`;
    }

    if (userProfile.display_name) {
        displaynameElement.innerHTML = escapedDisplayName;
    }

    if (userProfile.about) {
        aboutElement.innerHTML = escapedAbout;
    } else {
        aboutElement.innerHTML = "";
    }

    if (userProfile.username) {
        usernameElement.innerHTML = `@${escapedUsername}`;
        document.title = `@${userProfile.username}`;
        setMetaTag('kaspa:title', '@' + userProfile.username);
    } else if (userProfile.display_name) {
        document.title = userProfile.display_name;
        setMetaTag('kaspa:title', userProfile.display_name);
    } else {
        const fallbackName = npub.slice(0, 8);
        usernameElement.innerHTML = fallbackName;
        document.title = fallbackName;
        setMetaTag('kaspa:title', fallbackName);
    }

    nMenuBtn.style.display = 'inline-block';

    qrCodeElement.innerHTML = `
<div class="d-container">
<canvas id="qrcode-crypto" class="qrcode-crypto"></canvas>
<p class="w-message">Scan or copy the Kaspa address</p>
<pre class="w-data">${escapedWalletAddress}</pre>
<button class="button" data-copy>Copy</button>
</div>
  `;
    generateQRCode(document.getElementById('qrcode-crypto'), walletAddress, 200);

    const copyButton = document.querySelector('[data-copy]');

    copyButton.addEventListener('click', () => {
      copyToClipboard(walletAddress);
      const originalText = copyButton.textContent;
      copyButton.textContent = 'Copied to clipboard';
      copyButton.disabled = true;
      setTimeout(() => {
        copyButton.textContent = originalText;
        copyButton.disabled = false;
      }, 1500);
    });

    setMetaTag('kaspa:wallet', walletAddress);

    pool.close(relays);
}

    nMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        popupMenu.style.display = popupMenu.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', () => {
        popupMenu.style.display = 'none';
    });

    function runSearch(npubInput) {
        if (npubInput) {
            window.location.href = `https://kaspahub.org/n/?user=${npubInput}`;
        }
    }

    document.addEventListener('click', function(e) {
        if (e.target.id === 'searchBtn') {
            runSearch(document.getElementById('searchBox')?.value);
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.target.id === 'searchBox' && e.key === 'Enter') {
            runSearch(e.target.value);
        }
    });
});
</script>
