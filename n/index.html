<body>
<nav aria-label="Main Navigation"><div class="navTop"><input type="checkbox" id="menuCheck" aria-label="Toggle navigation menu" onchange="menu()" /><a id="title" href="/" aria-label="Home">Kaspa Hub</a></div><div class="navLinks widescreen-only"><a class="navTag" href="/posts/">Articles</a><a class="navTag" href="/news/">News</a><a class="navTag" href="/explorer/">Explorer</a></div><div class="navActions"><a id="priceTag" aria-live="polite" href="/price/"></a><input type="checkbox" id="themeCheck" aria-label="Toggle dark mode" onchange="theme()" /></div></nav>
<aside><div id="drawer"><div id="drawer-list"></div></div><div id="drawer-overlay" onclick="menu(true)"></div></aside>

<main id="container-h">

    <div id="userBanner" style="background-image: url(/assets/bg-light.webp);"></div>

    <section id="profile-section" class="fade-in" style="display:none;">

        <div style="display: flex; justify-content: space-between;">

            <div style="display: flex; gap: 20px; padding: 10px;">
                <div id="picture"><img id="avatar" src="https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/icons/loading-hq.gif" alt="" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/icons/user.svg';"></div>
            </div>

            <div style="display: flex; align-items: center; gap: 12px; padding: 0 10px;">
                <div id="tabs" class="tabs" role="tablist">
                    <button id="crypto-tab" class="tab-button active" role="tab" aria-selected="true" data-tab="crypto">Cryptocurrencies</button>
                    <button id="posts-tab" class="tab-button" role="tab" aria-selected="false" data-tab="posts">Recent Posts</button>
                </div>

            </div>
                <button id="optionsCtn" type="button" popovertarget="optionsMenu" aria-label="Options"></button>
        </div>

            <div id="optionsMenu" role="menu" popover></div>

        <div class="main-content-area">
            <div class="sidebar">
                <h1 id="display_name"></h1>
                <p id="name" style="opacity: 0.8;"></p>
                <div id="about"></div>
                <div id="website-container" style="margin-top:8px;"></div>
            </div>
            <div id="content">
                <div id="walletsContainer"></div>
                <div id="postsContainer" style="display:none;"></div>
            </div>
        </div>

    </section>

        <div class="w-header">

        <input type="text" id="searchBox" placeholder="npub..." required="">

            <button class="button" id="searchBtn">Search</button>
        </div>
    </section>

</main>

<style>
.d-container {
    justify-items: center;
    max-width: 350px;
    text-align: center;
}

#userBanner {
    margin: 0;
    padding: 0;
    border-radius: 20px;
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-size: cover;
}

#profile-section {
    padding: 10px 0;
    /*flex-grow: 1;*/
}

#search-section {
    max-width: 800px;
    place-self: center;
}

#postsContainer, #walletsContainer {
    display:flex;
    flex-direction:column;
    gap:16px;
}
#picture {
    flex-shrink: 0;
    width: 150px;
    height: 150px;
    margin-top: -70%;
}

#content {
    flex-grow: 1;
    justify-items: center;
}
.wallet-tile {
    margin-bottom: 20px;
}

.wallet-tile summary {
    list-style: none;
    padding: 18px 24px;
    font-size: 1.25rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.2s;
}

.wallet-tile summary:hover {
    background-color: rgba(255, 255, 255, 0.15);
    border-radius: 25px;
}

.wallet-tile summary::-webkit-details-marker {
    display: none;
}

.wallet-tile .tile-content {
    padding: 0 24px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.wallet-tile[open] .tile-content {
    max-height: 800px;
    padding-bottom: 24px;
}


.wallet-tile canvas.qrcode-crypto {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 12px auto 0;
    border-radius: 10px;
    background: #fff;
    padding: 12px;
    border: 1px solid #eee;
}

.tabs {
    display: flex;
    gap: 4px;
    background-color: var(--background-color);
    padding: 4px;
    border-radius: 9999px;
}

#itemList {
    flex-direction: column;
    display: none;
}

.tab-button {
    padding: 8px 20px;
    border: none;
    background: none;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 9999px;
    transition: all 0.2s ease;
    cursor: pointer;
}

.tab-button:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.tab-button.active {
    background-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
}

.note-user {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.note-content {
    white-space: pre-line;
}

.note-media {
    border-radius: 20px;
    max-width: 100%;
    height: auto;
    max-height: 450px;
    display: block;
    margin: 15px auto;
}

@media (prefers-color-scheme: dark) {
    .wallet-tile {
        background: #1a1a1a;
        border-color: #333;
    }
    .wallet-tile summary:hover {
        background: #252525;
    }
    .tabs {
        background-color: #252525;
    }
    .tab-button {
        color: #ccc;
    }
    .tab-button:hover {
        background: #333;
    }
    .tab-button.active {
        background: #1a1a1a;
        color: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }
}

@media (max-aspect-ratio: 1/1) {
    #userBanner {
        background-size: auto 100%; 
        background-position: center;
    }
}
</style>


<script type="text/javascript">
'use strict';

document.addEventListener("DOMContentLoaded", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const npub = urlParams.get('user');
    const usernameElement = document.getElementById("name");
    const displaynameElement = document.getElementById("display_name");
    const aboutElement = document.getElementById("about");
    const websiteContainer = document.getElementById("website-container");
    const walletsContainer = document.getElementById("walletsContainer");
    const errorDiv = document.getElementById("error");
    const profileSection = document.getElementById("profile-section");
    const searchSection = document.getElementById("search-section");
    const optionsCtn = document.getElementById('optionsCtn');
    const optionsMenu = document.getElementById('optionsMenu');
    const avatar = document.getElementById('avatar');

    const relays = [
        'wss://relay.damus.io',
        'wss://nos.lol',
        'wss://relay.primal.net'
    ];

    function escHtml(unsafe) {
        return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function generateQRCode(canvas, text) {
        new QRious({
            element: canvas,
            value: text,
            size: 256
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
    }

    function setMetaTag(name, content) {
        const meta = document.createElement('meta');
        meta.setAttribute('name', name);
        meta.setAttribute('content', content);
        document.head.appendChild(meta);
    }

    function processPostContent(content) {
        const urlRegex = /(https:\/\/[^\s<>"']+)/g;
        const imageRegex = /(https:\/\/[^\s<>"']+\.(?:jpg|jpeg|png|gif|webp))/gi;
        let processed = content.replace(imageRegex, url => `<img src="${url}" class="note-media" alt="Nostr media">`);
        processed = processed.replace(urlRegex, url => !url.match(imageRegex) ? `<a href="${url}" target="_blank" rel="noopener">${url}</a>` : url);
        return processed;
    }

    if (!npub) {
        searchSection.style.display = "block";
        return;
    }

    profileSection.style.display = "block";

    let publicKey;
    try {
        if (npub.startsWith('npub')) {
            publicKey = window.NostrTools.nip19.decode(npub).data;
        } else {
            publicKey = npub;
        }
    } catch (err) {
        aboutElement.textContent = "Invalid npub provided.";
        errorDiv.textContent = "Error: " + err.message;
        return;
    }

    const pool = new window.NostrTools.SimplePool();
    let profile = null;

    for (const relay of relays) {
        try {
            const events = await pool.querySync([relay], { kinds: [0], authors: [publicKey], limit: 1 });
            if (events && events.length > 0) {
                const event = events[0];
                profile = JSON.parse(event.content);
                break;
            }
        } catch (err) {
            console.error(`Failed to query ${relay} for profile:`, err);
        }
    }

    const escapedNpub = escHtml(npub);
    const escapedDisplayName = profile && profile.display_name ? escHtml(profile.display_name) : '';
    const escapedUsername = profile && profile.username ? escHtml(profile.username) : '';
    const escapedAbout = profile && profile.about ? escHtml(profile.about) : '';
    const pictureUrl = profile && profile.picture && profile.picture.startsWith('https:') ? profile.picture : '';
    const escapedPictureUrl = pictureUrl ? escHtml(pictureUrl) : '';
    const websiteUrl = profile && profile.website && profile.website.startsWith('http') ? profile.website : '';
    const escapedWebsiteUrl = websiteUrl ? escHtml(websiteUrl) : '';
    const lud16 = profile && profile.lud16 && profile.lud16.includes('@') ? profile.lud16 : '';

    const menuItems = [];
    menuItems.push(`<a href="/account/register/">Sign up</a><button type="button" data-copy-npub>Copy Public Key</button>`);
    if (lud16) menuItems.push(`<button type="button" data-copy-lud16>Copy Lightning</button>`);
    if (websiteUrl) menuItems.push(`<a href="${escapedWebsiteUrl}" target="_blank">Visit Website</a>`);
    optionsMenu.innerHTML = menuItems.join('');

    const npubBtn = optionsMenu.querySelector('[data-copy-npub]');
    if (npubBtn) npubBtn.addEventListener('click', () => navigator.clipboard.writeText(npub));
    const ludBtn = optionsMenu.querySelector('[data-copy-lud16]');
    if (ludBtn) ludBtn.addEventListener('click', () => navigator.clipboard.writeText(lud16));

    if (escapedPictureUrl) {
        avatar.src = escapedPictureUrl
    } else {
        avatar.src = "https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/icons/user.svg";
    }

    if (profile && profile.display_name) displaynameElement.innerHTML = escapedDisplayName;
    if (profile && profile.about) aboutElement.innerHTML = escapedAbout;

    if (profile && profile.username) {
        usernameElement.innerHTML = `@${escapedUsername}`;
        document.title = `@${profile.username}`;
        setMetaTag('kaspa:title', '@' + profile.username);
    } else if (profile && profile.display_name) {
        document.title = profile.display_name;
        setMetaTag('kaspa:title', profile.display_name);
    } else {
        const fallbackName = npub.slice(0, 8);
        usernameElement.innerHTML = fallbackName;
        document.title = fallbackName;
        setMetaTag('kaspa:title', fallbackName);
    }

    if (websiteUrl) {
        websiteContainer.innerHTML = `<a href="${escapedWebsiteUrl}" target="_blank">${escapedWebsiteUrl}</a>`;
    }

    optionsCtn.style.display = 'block';

    const cryptoObj = profile && profile.cryptocurrencies && typeof profile.cryptocurrencies === 'object' ? profile.cryptocurrencies : {};

    if (Object.keys(cryptoObj).length === 0) {
        walletsContainer.innerHTML += '<p style="opacity:0.7;text-align:center;">No cryptocurrency wallets added yet.</p>';
    } else {
        let tilesHTML = '';
        Object.entries(cryptoObj).forEach(([ticker, address]) => {
            const upperTicker = ticker.toUpperCase();
            const safeAddress = escHtml(address);
            tilesHTML += `
<details class="wallet-tile note theme-1">
<summary>
<span class="ticker">${upperTicker}</span>
</summary>
<div class="tile-content">
<pre class="w-data">${safeAddress}</pre>
<button class="button" data-copy-wallet>Copy Address</button>
<canvas class="qrcode-crypto" data-address="${safeAddress}"></canvas>
</div>
</details>
`;
        });
        walletsContainer.innerHTML += tilesHTML;

        setTimeout(() => {
            document.querySelectorAll('.wallet-tile canvas').forEach(canvas => {
                generateQRCode(canvas, canvas.dataset.address);
            });
            document.querySelectorAll('button[data-copy-wallet]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const address = this.parentElement.querySelector('pre').textContent;
                    copyToClipboard(address);
                    const orig = this.textContent;
                    this.textContent = 'Copied!';
                    this.disabled = true;
                    setTimeout(() => { this.textContent = orig; this.disabled = false; }, 1500);
                });
            });
        }, 10);
    }

    const cryptoTabBtn = document.getElementById("crypto-tab");
    const postsTabBtn = document.getElementById("posts-tab");
    const postsContainer = document.getElementById("postsContainer");
    let postsLoaded = false;

    async function loadNostrPosts() {
        postsLoaded = true;
        postsContainer.innerHTML = `
            <div id="loadingPosts" class="muted loading"><span class="spinner"></span><span>Loading…</span></div>
            <div id="itemList"></div>
            <button class="theme-1" id="loadMoreBtn" style="display:none;margin:20px auto 0;">Load More</button>
        `;
        const loadingPosts = postsContainer.querySelector("#loadingPosts");
        const itemList = postsContainer.querySelector("#itemList");
        const loadMoreBtn = postsContainer.querySelector("#loadMoreBtn");
        const postPool = new window.NostrTools.SimplePool();
        let mergedPosts = new Map();
        let deletedPostIds = new Set();
        let firstRenderDone = false;
        let allPostsArray = [];
        let currentIndex = 0;
        const FIRST_RELAY_LIMIT = 7;
        const OTHER_RELAY_LIMIT = 50;
        const CHUNK_SIZE = 15;

        function createArticle(post) {
            const date = new Date(post.created_at * 1000).toLocaleString();
            const article = document.createElement('article');
            article.className = "theme-1 note";
            article.innerHTML = `
                <div class="note-user">
                    <img src="${escapedPictureUrl || 'https://cdn.jsdelivr.net/gh/kaspahub/kaspahub.github.io@main/assets/icons/user.svg'}" style="width:50px;height:50px;border-radius:50%" alt="">
                    <span>
                        <p style="font-weight:bold;margin:0">${escapedDisplayName || escapedUsername || 'User'}</p>
                        <span class="muted">@${escapedUsername || ''}</span>
                    </span>
                </div>
                <p class="note-content">${processPostContent(post.content)}</p>
                <p style="color:#666;font-size:0.85em">Posted on ${date}</p>
            `;
            return article;
        }

        function renderPostsChunk(reset = false) {
            if (reset) {
                itemList.innerHTML = '';
                currentIndex = 0;
            }
            const chunk = allPostsArray.slice(currentIndex, currentIndex + CHUNK_SIZE);
            chunk.forEach(post => itemList.appendChild(createArticle(post)));
            currentIndex += chunk.length;
            loadMoreBtn.style.display = currentIndex < allPostsArray.length ? 'block' : 'none';
        }

        async function fetchPostsFromRelay(relay, limit) {
            try {
                const deletionEvents = await postPool.querySync([relay], { kinds: [5], authors: [publicKey] });
                deletionEvents.forEach(ev => {
                    ev.tags.filter(tag => tag[0]==='e').map(tag => tag[1]).forEach(id => deletedPostIds.add(id));
                });
                const events = await postPool.querySync([relay], { kinds: [1], authors: [publicKey], limit });
                const posts = [];
                events.forEach(ev => {
                    const isReply = ev.tags.some(tag => tag[0] === 'e');
                    if (!isReply && !deletedPostIds.has(ev.id)) posts.push(ev);
                });
                if (!firstRenderDone && posts.length > 0) {
                    allPostsArray = posts.slice(0, FIRST_RELAY_LIMIT);
                    renderPostsChunk(true);
                    firstRenderDone = true;
                    loadingPosts.style.display = 'none';
                    itemList.style.display = 'flex';
                }
                return posts;
            } catch (err) {
                console.error(`Failed to query ${relay} for posts:`, err);
                return [];
            }
        }

        const postsPromises = relays.map((relay, i) => fetchPostsFromRelay(relay, i === 0 ? FIRST_RELAY_LIMIT : OTHER_RELAY_LIMIT));
        const allPostsByRelay = await Promise.all(postsPromises);
        allPostsByRelay.flat().forEach(ev => { if (!mergedPosts.has(ev.id)) mergedPosts.set(ev.id, ev); });
        allPostsArray = Array.from(mergedPosts.values()).sort((a,b) => b.created_at - a.created_at);
        if (!firstRenderDone) {
            renderPostsChunk(true);
            loadingPosts.style.display = 'none';
            itemList.style.display = 'flex';
        }
        if (allPostsArray.length === 0) {
            itemList.innerHTML = '<p style="opacity:0.7;text-align:center;">No recent posts found.</p>';
        }
        if (allPostsArray.length > CHUNK_SIZE) loadMoreBtn.style.display = 'block';
        loadMoreBtn.addEventListener('click', () => renderPostsChunk());
        postPool.close(relays);
    }

    function switchTab(tabName) {
        if (tabName === "crypto") {
            cryptoTabBtn.classList.add("active");
            postsTabBtn.classList.remove("active");
            cryptoTabBtn.setAttribute("aria-selected", "true");
            postsTabBtn.setAttribute("aria-selected", "false");
            walletsContainer.style.display = "block";
            postsContainer.style.display = "none";
        } else {
            cryptoTabBtn.classList.remove("active");
            postsTabBtn.classList.add("active");
            cryptoTabBtn.setAttribute("aria-selected", "false");
            postsTabBtn.setAttribute("aria-selected", "true");
            walletsContainer.style.display = "none";
            postsContainer.style.display = "block";
            if (!postsLoaded) loadNostrPosts();
        }
    }

    cryptoTabBtn.addEventListener("click", () => switchTab("crypto"));
    postsTabBtn.addEventListener("click", () => switchTab("posts"));

    if (Object.keys(cryptoObj).length === 0) {
        switchTab("posts");
    } else {
        switchTab("crypto");
    }

    pool.close(relays);
});

function runSearch(npubInput) {
    if (npubInput) window.location.href = `/?user=${npubInput}`;
}

document.addEventListener('click', e => { if (e.target.id === 'searchBtn') runSearch(document.getElementById('searchBox')?.value); });
document.addEventListener('keydown', e => { if (e.target.id === 'searchBox' && e.key === 'Enter') runSearch(e.target.value); });
</script>
