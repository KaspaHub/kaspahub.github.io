<script type="text/javascript">
'use strict';

let items = [];
let filteredItems = [];
let currentIndex = 0;
const itemsPerPage = 42;

const itemGrid = document.getElementById('itemGrid');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const familyRadios = document.querySelectorAll('input[type="radio"][data-family]');
const featureCheckboxes = document.querySelectorAll('input[type="checkbox"][data-feature]');
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const counter = document.getElementById('counter');

const featureTags = {
    reviewed: { label: '', class: 'reviewed' },
    verified: { label: '', class: 'verified' }
};

function renderItems(reset = false) {
    if (reset) {
        itemGrid.innerHTML = '';
        currentIndex = 0;
    }
    const slice = filteredItems.slice(currentIndex, currentIndex + itemsPerPage);
    const fragment = document.createDocumentFragment();
    for (let i = 0; i < slice.length; i++) {
        const item = slice[i];
        const card = document.createElement('a');
        card.className = 'filter-card theme-1';
        card.href = item.link;
        card.target = '_blank';

        let featuresHtml = '';
        for (let j = 0; j < item.features.length; j++) {
            const f = item.features[j];
            if (featureTags[f]) featuresHtml += `<span class="feature-tag ${featureTags[f].class}">${featureTags[f].label}</span>`;
        }

        card.innerHTML = `<div class="item-header"><div class="filter-logo"><img src="${item.logo}" alt="${item.name} Logo" onerror="this.onerror=null;this.src='/assets/logos/logo.webp';" loading="lazy"></div><div class="item-top-actions"></div></div><h3>${item.name} ${featuresHtml}</h3><p class="filter-description">${item.description}</p>`;
        fragment.appendChild(card);
    }
    itemGrid.appendChild(fragment);
    currentIndex += slice.length;
    counter.textContent = `(${filteredItems.length} of ${items.length})`;
    loadMoreBtn.style.display = currentIndex < filteredItems.length ? 'block' : 'none';
}

function filterItems() {
  const selectedFamily = document.querySelector('input[type="radio"][data-family]:checked')?.dataset.family || 'all';
  const activeFeatures = Array.from(featureCheckboxes)
    .filter(cb => cb.checked)
    .map(cb => cb.dataset.feature);

  const searchTerm = searchInput.value.trim().toLowerCase();

  filteredItems = items.filter(item => {
    const familyMatch = selectedFamily === 'all' || item.features.includes(selectedFamily);

    const featureMatch = activeFeatures.length === 0 ||
      activeFeatures.every(f => item.features.includes(f));

    const searchMatch = !searchTerm ||
      item.name.toLowerCase().includes(searchTerm) ||
      item.description.toLowerCase().includes(searchTerm);

    return familyMatch && featureMatch && searchMatch;
  });

  const sortMode = sortSelect.value;
  if (sortMode === 'az') {
    filteredItems.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortMode === 'za') {
    filteredItems.sort((a, b) => b.name.localeCompare(a.name));
  }

  if (filteredItems.length === 0) {
    itemGrid.innerHTML = '<p class="no-items-message">No distributions match your filters.</p>';
    loadMoreBtn.style.display = 'none';
    counter.textContent = ` (0 of ${items.length})`;
    return;
  }

  renderItems(true);
}

familyRadios.forEach(r => r.addEventListener('change', filterItems));
featureCheckboxes.forEach(cb => cb.addEventListener('change', filterItems));
searchInput.addEventListener('input', filterItems);
sortSelect.addEventListener('change', filterItems);
loadMoreBtn.addEventListener('click', () => renderItems());

fetch('/linux/assets/linux-distros.json?v=0')
  .then(res => {
    if (!res.ok) throw new Error('Failed to load');
    return res.json();
  })
  .then(data => {
    items = data;
    filteredItems = [...items];
    renderItems(true);
  })
  .catch(err => {
    console.error(err);
    itemGrid.innerHTML = '<p class="no-items-message">Failed to load distributions.</p>';
  });
</script>
