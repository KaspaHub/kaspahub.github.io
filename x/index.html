<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="robots" content="noindex, nofollow" />

	<title>Kaspa Donation Link</title>
	<meta name="twitter:title" content="Kaspa Donation Link" />
	<meta property="og:title" content="Kaspa Donation Link" />

	<meta name="twitter:card" content="summary" />
	<meta name="twitter:image" content="https://kaspahub.org/assets/logo.jpg" />
	<meta property="og:image" content="https://kaspahub.org/assets/logo.jpg" />

	<meta name="twitter:site" content="@KaspaHub" />
	<meta name="twitter:creator" content="@KaspaHub" />
	<meta property="og:site_name" content="Kaspa Hub" />

	<meta name="theme-color" content="#000000" />
	<link rel="stylesheet" href="https://kaspahub.org/assets/styles/main.css" />
	<link rel="manifest" href="https://kaspahub.org/assets/manifest.json" />
	<link rel="apple-touch-icon" sizes="180x180" href="https://kaspahub.org/assets/logo-180.png" />
	<link rel="icon" type="image/png" sizes="32x32" href="https://kaspahub.org/assets/logo-32.png">
	<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
main {
	display: flex;
	flex-direction: column;
	align-items: center;
}
#page-title {
	margin-bottom: 20px;
}
#text-display {
	max-width: 600px;
	text-align: center;
	font-size: 1.2rem;
	word-wrap: break-word;
}
#open-button {
	color: white;
	text-decoration: none;
	font-weight: inherit;
}
.button {
	width: 200px;
	margin: 20px 0;
}
</style>
</head>

<body>

<header>
	<nav id="page-nav">
		<h2><a href="/">Kaspa Hub</a></h2>
		<div class="toggle-theme">
			<input type="checkbox" id="toggle-theme-checkbox" aria-label="Toggle theme-1">
			<label for="toggle-theme-checkbox"></label>
		</div>
	</nav>
	<script>const c=document.getElementById("toggle-theme-checkbox");c.addEventListener("change",()=>{document.cookie="theme="+(c.checked?"dark":"light")+"; path=/; SameSite=Lax";location.reload()}),c.checked=document.cookie.includes("theme=dark"),(()=>{document.body.classList.add("background-"+(document.cookie.includes("theme=dark")?"dark":"light"))})();</script>
</header>

<main class="container">
	<h1 id="page-title">Kaspa Donations</h1>
	<div id="text-display" class="theme-1">Loading...</div>
	<div class="qr-code" id="qr-code" style="margin: 20px 0px;"></div>
	<button class="button" id="copy-button" style="display: none;">Copy Wallet Address</button>
	<a class="button" id="open-button" style="display: none;" href="" target="_blank">Open Wallet</a>
</main>

<script src="https://cdn.jsdelivr.net/gh/KaspaHub/KaspaHub@latest/assets/scripts/jquery.js"></script>
<script src="https://cdn.jsdelivr.net/gh/KaspaHub/KaspaHub@latest/assets/scripts/jquery-qrcode-0.18.0.min.js"></script>
<script type="module">
import { users } from 'https://kaspahub.github.io/directory/users.js';

document.addEventListener("DOMContentLoaded", () => {
	const urlParams = new URLSearchParams(window.location.search);
	const xUserRaw = urlParams.get('user');

	const displayElement = document.getElementById("text-display");
	const titleElement = document.getElementById("page-title");
	const qrCodeElement = document.getElementById("qr-code");
	const copyButton = document.getElementById("copy-button");
	const openButton = document.getElementById("open-button");

	function setMetaTag(name, content) {
		const meta = document.createElement('meta');
		meta.setAttribute('name', name);
		meta.setAttribute('content', content);
		document.head.appendChild(meta);
	}

	if (!xUserRaw) {
		displayElement.textContent = "Missing X handle in the URL. Use ?user=YourXHandle";
		return;
	}

	const user = users.find(u => u.x?.toLowerCase() === xUserRaw.toLowerCase());

	if (!user) {
		displayElement.innerHTML = `<span class='error'>No user found with X handle <strong>@${xUserRaw}</strong>.</span>`;
		return;
	}

	document.title = `@${user.x}`;
	titleElement.innerHTML = `<a href="https://x.com/${user.x}" target="_blank" rel="noopener noreferrer">@${user.x}</a>`;
	setMetaTag('kaspa:title', '@' + user.x);

	let displayText = user.wallet;
	if (user.domain) {
		displayText += `<br><br><span style="font-size: 1rem; opacity: 0.75;">${user.domain}</span>`;
	}

	displayElement.innerHTML = displayText;

	$('#qr-code').qrcode({
		render: 'image',
		text: user.wallet,
		size: 256,
		quiet: 3
	});

	copyButton.style.display = "inline-block";
	copyButton.addEventListener('click', () => {
		navigator.clipboard.writeText(user.wallet).then(() => {
			const originalText = copyButton.textContent;
			copyButton.textContent = 'Copied!';
			setTimeout(() => {
				copyButton.textContent = originalText;
			}, 1500);
		});
	});

	if (window.innerHeight > window.innerWidth) {
		openButton.style.display = "inline-block";
		openButton.href = user.wallet;
	}

	setMetaTag('kaspa:wallet', user.wallet);
});
</script>

</body>
</html>
