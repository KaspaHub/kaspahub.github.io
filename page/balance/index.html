<body>

<nav id="navBar"><input id="menu" type="button" aria-label="Menu Toggle" onclick="menu()" /><a id="title" href="/">Kaspa Hub</a><input id="theme" type="checkbox" aria-label="Theme Toggle" onclick="theme()" /></nav><script async src="/assets/scripts/main.js"></script>

<main id="container-1">
<div class="intro">
    <h1>Check Kaspa Wallet Balance</h1>
    <p class="hint">Paste a Kaspa address (e.g. <code>kaspa:qq...</code>) to see its current balance.</p>
</div>

<div id="searchContainer">
  <input 
    type="text" 
    id="searchBox" 
    placeholder="kaspa:qq..." 
    required
  >
  <button class="button" id="searchBtn">Search</button>
</div>

<div id="loading" hidden>
  <span class="spinner"></span> Fetching…
</div>

<div id="msg"></div>
<div id="results" class="results" hidden></div>

<script>
const API_BASE = "https://api.kaspa.org";
const SOMPI_PER_KAS = 100_000_000;

const searchBox = document.getElementById('searchBox');
const searchBtn = document.getElementById('searchBtn');
const msg = document.getElementById('msg');
const results = document.getElementById('results');

function isKaspaAddress(s) {
  return typeof s === 'string'
    && s.toLowerCase().startsWith('kaspa:')
    && s.length >= 20 && s.length <= 120;
}

function formatKasFromSompi(sompi) {
  const kas = Number(sompi) / SOMPI_PER_KAS;
  return kas.toLocaleString(undefined, {
    minimumFractionDigits: 0,
    maximumFractionDigits: 8
  });
}

function formatUsd(usd) {
  return usd.toLocaleString(undefined, {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 2,
    maximumFractionDigits: 8
  });
}

function setStatus(html, ok=false) {
  msg.innerHTML = html ? `<div class="${ok ? 'ok' : 'error'}">${html}</div>` : '';
}

async function fetchBalance(address) {
  const url = `${API_BASE}/addresses/${encodeURIComponent(address)}/balance`;
  const res = await fetch(url, { headers: { 'accept': 'application/json' }});
  if (!res.ok) {
    throw new Error(`API error ${res.status}`);
  }
  const data = await res.json();

  let sompi =
    (typeof data.balance === 'number' && data.balance) ??
    (typeof data.balanceSompi === 'number' && data.balanceSompi) ??
    (typeof data.utxoBalance === 'number' && data.utxoBalance) ??
    null;

  if (sompi === null) {
    const keys = Object.keys(data);
    throw new Error(`Unexpected response format. Keys: ${keys.join(', ') || '(none)'}`);
  }

  return { sompi, url };
}

async function fetchKasPrice() {
  const url = `${API_BASE}/info/price`;
  const res = await fetch(url, { headers: { 'accept': 'application/json' }});
  if (!res.ok) {
    throw new Error(`Price API error ${res.status}`);
  }
  const data = await res.json();

  if (typeof data.price !== 'number') {
    throw new Error("Unexpected price response");
  }

  return data.price;
}

function renderResults(address, sompi, kasPriceUsd) {
  const kas = Number(sompi) / SOMPI_PER_KAS;
  const usdValue = kas * kasPriceUsd;

  return `
<div class="theme-1">
  <div class="row">
    <div class="label">Address</div>
    <div class="value">${address}</div>
  </div>
  <div class="row">
    <div class="label">Balance (KAS)</div>
    <div class="value">${formatKasFromSompi(sompi)}</div>
  </div>
  <div class="row">
    <div class="label">Balance (sompi)</div>
    <div class="value">${Number(sompi).toLocaleString()}</div>
  </div>
  <div class="row">
    <div class="label">Value (USD)</div>
    <div class="value">${formatUsd(usdValue)}</div>
  </div>
<div class="footer tiny">
  Notes:
  <ul>
    <li>1 KAS = 100,000,000 sompi.</li>
  </ul>
</div>
</div>
`;
}

async function handleSearch() {
  const address = searchBox.value.trim();

  results.hidden = true;
  setStatus('');

  if (!isKaspaAddress(address)) {
    setStatus('Please enter a valid Kaspa address (should start with <code>kaspa:</code>).');
    return;
  }

  const prev = searchBtn.textContent;
  searchBtn.disabled = true;
  loading.hidden = false; 

  try {
    const [{ sompi }, kasPriceUsd] = await Promise.all([
      fetchBalance(address),
      fetchKasPrice()
    ]);

    results.innerHTML = renderResults(address, sompi, kasPriceUsd);
    results.hidden = false;

    setStatus('✔ Balance and USD value fetched successfully.', true);
  } catch (err) {
    console.error(err);
    setStatus(`Couldn’t fetch data. ${err.message ? String(err.message) : ''}`);
  } finally {
    searchBtn.disabled = false;
    loading.hidden = true;
  }
}

searchBtn.addEventListener('click', handleSearch);
searchBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    handleSearch();
  }
});

window.addEventListener('DOMContentLoaded', () => searchBox.focus());
</script>

</main>

<footer><a href="https://kaspahub.org/">Kaspa Community Hub</a></footer>

</body>
