document.addEventListener("DOMContentLoaded", function() {
	const contentEditableDiv = document.querySelector(".note-editable");

	if (contentEditableDiv) {
		contentEditableDiv.addEventListener("keydown", function(event) {
			if (event.keyCode === 9 && contentEditableDiv.innerHTML !== "") {
				event.preventDefault();
				document.execCommand("insertHTML", false, "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;");
			}
		});
	}
});
</script>
	<div class="title" style="font-size: 0.8em; color: #757575; float: right;">&nbsp;<span id="htmlCounter"><span id="charCount">0</span> /30000 Characters</span><div style="min-height: 10px;"></div>
<script>
var editor = document.getElementById("text-editor");
var charCountLabel = document.getElementById('charCount');
var maxLength = 30000;

editor.addEventListener('input', function() {
	var charCount;

	if (editor.innerText.replace(/\n/g, '').length >= 160) {
		charCount = editor.innerHTML.length;
	} else {
		charCount = editor.innerText.replace(/\n/g, '').length;
	}

	charCountLabel.innerHTML = charCount;

	if (charCount > maxLength) {
		charCountLabel.style.color = 'red';
	} else {
		charCountLabel.style.color = 'inherit';
	}
});
</script>

<script>
function toggleAdditional() {
	var additionalOptions = document.getElementById("note-toolbar");
	additionalOptions.classList.toggle("hidden");
}

function toggleInformation() {
	var editorInformation = document.getElementById("information");
	editorInformation.classList.toggle("hidden");
}

const element = document.getElementById("text-editor");
element.addEventListener("paste", function(e) {
	e.preventDefault();
	const text = e.clipboardData.getData("text/plain");
	document.execCommand("insertText", false, text);
});

function removeFormat() {
	document.execCommand('removeFormat');
	document.execCommand("unlink", false, null);
}

function bold() {
	document.execCommand("bold", false, null);
}

function italic() {
	document.execCommand("italic", false, null);
}

function underline() {
	document.execCommand("underline", false, null);
}

function strikethrough() {
	document.execCommand("strikethrough", false, null);
}

function insertBullets() {
	document.execCommand("insertUnorderedList", false, null);
}

function insertOrderedList() {
	document.execCommand("insertOrderedList", false, null);
}

function alignLeft() {
	document.execCommand("justifyLeft", false, null);
}

function alignCenter() {
	document.execCommand("justifyCenter", false, null);
}

function alignRight() {
	document.execCommand("justifyRight", false, null);
}

function formatText(value) {
	document.execCommand("formatBlock", false, value);
}

function insertSymbol(dropdown) {
	var symbol = dropdown.value;
	document.execCommand('insertHTML', false, symbol);
}



document.addEventListener("DOMContentLoaded", function() {
	const btnCodeViewer = document.querySelector('.btn-codeview');
	const htmlCounter = document.getElementById("htmlCounter");

	btnCodeViewer.addEventListener('click', function() {
		if (htmlCounter.classList.toggle("hidden")) {
			disableButtons();
		} else {
			enableButtons();
		}
	});

});


function disableButtons() {
	const buttons = document.querySelectorAll(".e-button, .color-button");
	buttons.forEach(button => {
		button.disabled = true;
	});
}

function enableButtons() {
	const buttons = document.querySelectorAll(".e-button, .color-button");
	buttons.forEach(button => {
		button.disabled = false;
	});
}
</script>

<script>
const result = document.getElementById("result");
const input = document.getElementById("input");

function append(value) {
	input.value += value;
	updateResult();
	result.focus();
}

function clean() {
	result.value = "";
	input.value = "";
}

function backspace() {
	input.value = input.value.slice(0, -1);
	updateResult();
}

function updateResult() {
 try {
	result.value = eval(input.value);
 } catch (error) {
	result.value = "";
 }
}

function calculate() {
try {
	input.value = eval(input.value);
	result.value = "";
	updateResult();
 } catch (error) {
	input.value = "";
	result.value = "";
 }
}



result.addEventListener("keypress", function(event) {
	if (event.key === "Enter") {
	event.preventDefault();
	calculate();
		updateResult();
	}
}); 
</script>
