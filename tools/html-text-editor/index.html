	<script>const c=document.getElementById("toggle-theme-checkbox");c.addEventListener("change",()=>{document.cookie="theme="+(c.checked?"dark":"light")+"; path=/; SameSite=Lax";location.reload()}),c.checked=document.cookie.includes("theme=dark"),(()=>{document.body.classList.add("background-"+(document.cookie.includes("theme=dark")?"dark":"light"))})();</script>

</div>

<script>
$('#summernote').summernote({
	// placeholder: 'Start writing...',
	prettifyHtml: true,
	tooltip: false,
	linkTargetBlank: false,
	styleWithSpan: true,
	styleTags: ['p', 'blockquote', 'pre', 'h1', 'h2', 'h3'],
	height: 400,
      toolbar: [
        ['style', ['clear']],
        ['style', ['bold', 'italic', 'underline', 'strikethrough']],
        ['style', ['ul', 'ol']],
        ['style', ['alignleft', 'aligncenter', 'alignright']],
        ['style', ['style']],
        ['style', ['fontsize']],
        ['style', ['color']],
        ['style', ['table']],
        ['style', ['link', 'picture', 'video']],
        ['style', ['symbolDropdown']],
        ['style', ['codeview']]
      ],
buttons: {
  symbolDropdown: function () {
    return $('<div class="note-btn-group btn-group">').append(`
      <select class="e-button note-btn" 
              style="margin: 0 5px; height: 30px; padding: 2px 5px;" 
              onchange="insertSymbol(this); this.selectedIndex = 0;" tabindex="-1">
        <option value="" selected disabled hidden>Symbols ▼</option>
        <option value="✓">✓</option>
        <option value="•">•</option>
        <option value="▲">▲</option>
        <option value="▼">▼</option>
        <option value="◄">◄</option>
        <option value="►">►</option>
        <option value="₿">₿</option>
        <option value="𐤊">𐤊</option>
      </select>
    `);
  }
}
});

function insertSymbol(select) {
	const symbol = select.value;
	$('#summernote').summernote('editor.insertText', symbol);
}

//tab
document.addEventListener("DOMContentLoaded", function() {
	const contentEditableDiv = document.querySelector(".note-editable");

	if (contentEditableDiv) {
		contentEditableDiv.addEventListener("keydown", function(event) {
			if (event.keyCode === 9 && contentEditableDiv.innerHTML !== "") {
				event.preventDefault();
				document.execCommand("insertHTML", false, "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;");
			}
		});
	}
});

document.addEventListener("DOMContentLoaded", function () {
  const editor = document.getElementById("text-editor");
  const charCountLabel = document.getElementById("charCount");
  const wordCountLabel = document.getElementById("wordCount");

  if (editor && charCountLabel && wordCountLabel) {
    editor.addEventListener("input", function () {
      const text = editor.innerText || "";
      const charCount = text.replace(/\n/g, "").length;

      const words = text.trim().split(/\s+/).filter(word => word.length > 0);
      const wordCount = words.length;

      charCountLabel.textContent = charCount;
      wordCountLabel.textContent = wordCount;
    });
  }
});






document.addEventListener("DOMContentLoaded", function() {
	const btnCodeViewer = document.querySelector('.btn-codeview');
	const htmlCounter = document.getElementById("htmlCounter");

	btnCodeViewer.addEventListener('click', function() {
		if (htmlCounter.classList.toggle("hidden")) {
			disableButtons();
		} else {
			enableButtons();
		}
	});

});


function disableButtons() {
	const buttons = document.querySelectorAll(".e-button");
	buttons.forEach(button => {
		button.disabled = true;
	});
}

function enableButtons() {
	const buttons = document.querySelectorAll(".e-button");
	buttons.forEach(button => {
		button.disabled = false;
	});
}



if (document.cookie.includes("theme=dark")) {
	document.querySelectorAll(".theme-filter").forEach(elem =>
		elem.classList.add("filter-dark")
	);
}

// function toggleAdditional() {
// 	var additionalOptions = document.getElementById("note-toolbar");
// 	additionalOptions.classList.toggle("hidden");
// }




// clean paste
let cleanPaste = true;

const toggleButton = document.getElementById("toggle-paste-mode");
const editor = document.getElementById("text-editor");

toggleButton.addEventListener("click", () => {
	cleanPaste = !cleanPaste;
	toggleButton.textContent = `Clean Paste: ${cleanPaste ? "ON" : "OFF"}`;
});

editor.addEventListener("paste", function(e) {
	if (cleanPaste) {
		e.preventDefault();
		const text = e.clipboardData.getData("text/plain");
		document.execCommand("insertText", false, text);
	}
});
</script>
