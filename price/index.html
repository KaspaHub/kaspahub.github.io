<script type="text/javascript">
'use strict';
document.addEventListener("DOMContentLoaded", () => {
  const button = document.getElementById("load-chart-btn");
  const container = document.getElementById("chart-container");
  let loaded = false;

  button.addEventListener("click", () => {
    if (!loaded) {
      const widget = document.createElement("div");
      widget.className = "tradingview-widget-container";
      widget.style = "height:100%; width:100%";
      widget.innerHTML = `
        <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
        <div class="tradingview-widget-copyright">
          <a href="https://www.tradingview.com/" rel="noopener nofollow" target="_blank">
            <span class="blue-text">Track all markets on TradingView</span>
          </a>
        </div>
      `;

      const script = document.createElement("script");
      script.type = "text/javascript";
      script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
      script.async = true;
      script.innerHTML = JSON.stringify({
        symbol: "MEXC:KASUSDT",
        interval: "60",
        theme: "dark",
        style: "1",
        locale: "en",
        autosize: true,
        backgroundColor: "#0F0F0F",
        gridColor: "rgba(242, 242, 242, 0.06)",
        timezone: "Etc/UTC",
        allow_symbol_change: true,
        hide_top_toolbar: false,
        hide_side_toolbar: true,
        hide_volume: false,
        calendar: false,
        details: false,
        save_image: true,
      });

      widget.appendChild(script);
      container.appendChild(widget);
      loaded = true;
      button.textContent = "❌ Close Chart";
    } else {
      container.innerHTML = "";
      loaded = false;
      button.textContent = "📈 Open Chart";
    }
  });
});
</script>

<script type="text/javascript">
'use strict';

const priceBox = document.getElementById("price");
const marketCapBox = document.getElementById("market-cap");
const fdvBox = document.getElementById("fdv");
const circBox = document.getElementById("circ-supply");
const maxBox = document.getElementById("max-supply");

const maxSupply = 28704026601;
let circSupply = 27071902916;
let price = 0.10;

function getCirculatingSupply() {
  fetch("https://api.kaspa.org/info/coinsupply/circulating")
    .then(res => res.json())
    .then(data => {
      if (typeof data === "number" && !isNaN(data)) {
        circSupply = data;
        console.log("Circulating Supply:", circSupply);
      }
    })
    .catch(err => {
      console.warn("Using fallback circulating supply:", err);
    });
}




function getPrice() {
  fetch("https://api.kaspa.org/info/price")
    .then(res => {
      if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
      return res.json();
    })
    .then(data => {
      if (!data || typeof data.price !== 'number' || isNaN(data.price)) {
        throw new Error("Invalid price data");
      }
      price = data.price;
      console.log("Price:", price);
      updatePage(price);
    })
    .catch(err => {
      console.error("Failed to fetch Kaspa price:", err);
      if (price !== null) {
        updatePage(price);
      } else {
        priceBox.textContent = "Error loading price";
      }
    });
}

function updatePage(price) {
  const price6 = price.toFixed(6);
  const pageTitle = `$${price.toFixed(4)} - KAS`;
  document.title = pageTitle;

  // Price
  priceBox.textContent = `$${price6}`;
  priceBox.classList.remove("updated");
  void priceBox.offsetWidth;
  priceBox.classList.add("updated");

  // Market stats
  const marketCap = price * circSupply;
  const fdv = price * maxSupply;
  marketCapBox.textContent = formatNumber(marketCap);
  fdvBox.textContent = formatNumber(fdv);
  circBox.textContent = `${(circSupply / 1e9).toFixed(2)}B KAS`;
  maxBox.textContent = `${(maxSupply / 1e9).toFixed(2)}B KAS`;

  // Meta tags
  let twitterMeta = document.querySelector('meta[name="twitter:title"]');
  if (!twitterMeta) {
    twitterMeta = document.createElement("meta");
    twitterMeta.setAttribute("name", "twitter:title");
    document.head.appendChild(twitterMeta);
  }
  twitterMeta.setAttribute("content", pageTitle);

  let ogMeta = document.querySelector('meta[property="og:title"]');
  if (!ogMeta) {
    ogMeta = document.createElement("meta");
    ogMeta.setAttribute("property", "og:title");
    document.head.appendChild(ogMeta);
  }
  ogMeta.setAttribute("content", pageTitle);
}

function formatNumber(value) {
  if (value >= 1e12) return `$${(value / 1e12).toFixed(2)}T`;
  if (value >= 1e9) return `$${(value / 1e9).toFixed(2)}B`;
  if (value >= 1e6) return `$${(value / 1e6).toFixed(2)}M`;
  return `$${value.toFixed(2)}`;
}

getCirculatingSupply();
getPrice();
setInterval(getPrice, 15000);
</script>
